<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>VAPE3 // USABLE</title>
    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <!-- LIBRARIES -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/RGBShiftShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

    <!-- 3D BACKGROUND LAYER -->
    <div id="canvas-container"></div>

    <!-- CRT EFFECT LAYER -->
    <div class="crt-overlay"></div>

    <!-- UI LAYER (USABLE) -->
    <div id="ui-layer">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo-area">
                <h1 class="sidebar-logo">SYF_OS</h1>
                <span class="sidebar-subtitle">V.3.0 HYBRID</span>
            </div>

            <div class="file-list" id="file-list-container">
                <!-- JS Generated Items -->
            </div>

            <div
                style="margin-top:auto; font-size: 0.8rem; color: #555; border-top: 1px solid #333; padding-top: 20px;">
                STATUS: ONLINE<br>
                GPU: ACTIVE<br>
                UX: RESTORED
            </div>
        </aside>

        <!-- CONTENT VIEWER -->
        <main class="content-viewer" id="main-viewer">
            <div class="viewer-header">
                <span id="viewer-filename">NO FILE</span>
                <div class="viewer-controls">
                    <button onclick="closeViewer()">[CLOSE]</button>
                </div>
            </div>
            <div class="viewer-body" id="viewer-content">
                <!-- Markdown Content -->
            </div>
        </main>

    </div>

    <script src="script.js"></script>
</body>

</html>
