<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYF V4 - Glitch Reality Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --void-black: #050505;
            --neon-green: #39FF14;
            --radioactive-yellow: #CCFF00;
            --cyber-red: #FF003C;
            --matrix-blue: #00D4FF;
            --font-display: 'Orbitron', monospace;
            --font-mono: 'JetBrains Mono', monospace;
            --glitch-intensity: 0;
        }
        
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            background-color: var(--void-black);
            color: var(--neon-green);
            font-family: var(--font-mono);
            height: 100vh;
            overflow: hidden;
            position: relative;
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 1px,
                    rgba(0, 0, 0, 0.1) 1px,
                    rgba(0, 0, 0, 0.1) 2px
                );
        }
        
        #glitch-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .glitch-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            opacity: 0;
        }
        
        .glitch-layer.active {
            opacity: 1;
            animation: glitchPulse 0.5s ease-in-out;
        }
        
        .rgb-split {
            background: 
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 2px,
                    rgba(255, 0, 60, 0.02) 2px,
                    rgba(255, 0, 60, 0.02) 4px
                ),
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 255, 65, 0.02) 2px,
                    rgba(0, 255, 65, 0.02) 4px
                ),
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 212, 255, 0.02) 2px,
                    rgba(0, 212, 255, 0.02) 4px
                );
            background-size: 300% 100%;
            background-position: 0 0;
            animation: rgbShift 3s linear infinite;
        }
        
        @keyframes rgbShift {
            0% { background-position: 0 0; }
            33% { background-position: 100% 0; }
            66% { background-position: 200% 0; }
            100% { background-position: 0 0; }
        }
        
        .displacement {
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(255, 255, 255, 0.01) 2px,
                    rgba(255, 255, 255, 0.01) 4px
                );
            filter: url(#displacement-filter);
            animation: displacementWave 4s ease-in-out infinite;
        }
        
        .data-corruption {
            background-image: 
                repeating-linear-gradient(
                    90deg,
                    rgba(0, 0, 0, 0.1),
                    rgba(0, 0, 0, 0.1) 1px,
                    transparent 1px,
                    transparent 2px
                ),
                repeating-linear-gradient(
                    0deg,
                    rgba(0, 0, 0, 0.1),
                    rgba(0, 0, 0, 0.1) 1px,
                    transparent 1px,
                    transparent 2px
                );
            mix-blend-mode: difference;
            animation: corruptionSpread 6s ease-in-out infinite;
        }
        
        .scan interference {
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 1px,
                    rgba(57, 255, 20, 0.02) 1px,
                    rgba(57, 255, 20, 0.02) 2px
                );
            animation: scanInterference 2s linear infinite;
        }
        
        @keyframes scanInterference {
            0% { transform: translateY(0); }
            100% { transform: translateY(100vh); }
        }
        
        @keyframes displacementWave {
            0%, 100% { filter: url(#displacement-filter); filter: url(#displacement-filter); }
            50% { filter: url(#displacement-filter-strong); }
        }
        
        @keyframes corruptionSpread {
            0% { background-position: 0 0; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0 0; }
        }
        
        @keyframes glitchPulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.5; }
        }
        
        .hud-content {
            position: relative;
            z-index: 20;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }
        
        .hero-title {
            font-family: var(--font-display);
            font-size: clamp(8rem, 25vw, 20rem);
            font-weight: 900;
            letter-spacing: -0.03em;
            text-shadow: 
                0 0 5px var(--neon-green),
                0 0 10px var(--neon-green),
                0 0 15px var(--neon-green);
            margin-bottom: 1.5rem;
            position: relative;
            background: linear-gradient(
                90deg,
                var(--neon-green),
                var(--radioactive-yellow),
                var(--matrix-blue),
                var(--cyber-red)
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .hero-title::before,
        .hero-title::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        
        .hero-title::before {
            background: 
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 2px,
                    rgba(255, 0, 60, 0.1) 2px,
                    rgba(255, 0, 60, 0.1) 4px
                );
            mix-blend-mode: difference;
            animation: titleGlitch 3s ease-in-out infinite;
        }
        
        .hero-title::after {
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 255, 65, 0.1) 2px,
                    rgba(0, 255, 65, 0.1) 4px
                );
            mix-blend-mode: difference;
            animation: titleGlitch 3s ease-in-out infinite 1.5s;
        }
        
        @keyframes titleGlitch {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-2px, 2px); }
            50% { transform: translate(2px, -2px); }
            75% { transform: translate(-1px, 1px); }
            100% { transform: translate(0, 0); }
        }
        
        .hero-subtext {
            font-size: 1.2rem;
            opacity: 0.7;
            margin-bottom: 2rem;
            letter-spacing: 0.1em;
            font-family: var(--font-display);
            text-transform: uppercase;
        }
        
        .hero-subtext.glitch-text {
            font-family: var(--font-mono);
            background: linear-gradient(
                90deg,
                var(--neon-green),
                var(--radioactive-yellow),
                var(--matrix-blue),
                var(--cyber-red)
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: subtitleGlitch 4s ease-in-out infinite;
        }
        
        @keyframes subtitleGlitch {
            0%, 100% { background-position: 0 0; }
            33% { background-position: 100% 0; }
            66% { background-position: 200% 0; }
            100% { background-position: 0 0; }
        }
        
        .glitch-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
            opacity: 0.1;
        }
        
        .glitch-grid-line {
            position: absolute;
            background: var(--neon-green);
        }
        
        .glitch-grid-line.horizontal {
            height: 1px;
            width: 100%;
        }
        
        .glitch-grid-line.vertical {
            width: 1px;
            height: 100%;
        }
        
        .cta-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
            margin-top: 2rem;
        }
        
        .glitch-button {
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 0.75rem 1.5rem;
            font-family: var(--font-display);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: isolated;
            min-width: 150px;
            text-align: center;
        }
        
        .glitch-button:hover {
            background: rgba(57, 255, 20, 0.1);
            box-shadow: 0 0 15px var(--neon-green);
            transform: translateY(-2px);
        }
        
        .glitch-button:active {
            transform: translateY(0);
        }
        
        .glitch-button.glitching {
            animation: buttonGlitch 0.1s ease-in-out;
        }
        
        @keyframes buttonGlitch {
            0%, 100% { transform: translate(0); }
            25% { transform: translate(-2px, 2px); }
            50% { transform: translate(2px, -2px); }
            75% { transform: translate(-1px, 1px); }
            100% { transform: translate(0); }
        }
        
        .glitch-button.secondary {
            border-color: var(--radioactive-yellow);
            color: var(--radioactive-yellow);
        }
        
        .glitch-button.secondary:hover {
            background: rgba(204, 255, 0, 0.1);
            box-shadow: 0 0 15px var(--radioactive-yellow);
        }
        
        .glitch-button.tertiary {
            border-color: var(--matrix-blue);
            color: var(--matrix-blue);
        }
        
        .glitch-button.tertiary:hover {
            background: rgba(0, 212, 255, 0.1);
            box-shadow: 0 0 15px var(--matrix-blue);
        }
        
        .status-indicators {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            display: flex;
            gap: 1rem;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--neon-green);
            animation: pulse 1.5s infinite;
        }
        
        .status-dot.warning { background: var(--radioactive-yellow); }
        .status-dot.error { background: var(--cyber-red); }
        .status-dot.info { background: var(--matrix-blue); }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        .watermark {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            font-size: 0.8rem;
            opacity: 0.3;
            font-family: var(--font-mono);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 25;
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(57, 255, 20, 0.03) 2px,
                    rgba(57, 255, 20, 0.03) 4px
                );
        }
        
        @media (max-width: 768px) {
            .hero-title {
                font-size: clamp(5rem, 20vw, 12rem);
            }
            
            .hero-subtext {
                font-size: 1rem;
            }
            
            .glitch-button {
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
                min-width: 120px;
            }
            
            .status-indicators {
                bottom: 1rem;
                left: 1rem;
            }
            
            .watermark {
                bottom: 1rem;
                right: 1rem;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div id="glitch-container">
        <!-- Glitch Layers -->
        <div class="glitch-layer rgb-split" id="rgb-split"></div>
        <div class="glitch-layer displacement" id="displacement"></div>
        <div class="glitch-layer data-corruption" id="corruption"></div>
        <div class="glitch-layer scan-interference"></div>
        
        <!-- Glitch Grid -->
        <div class="glitch-grid" id="glitch-grid"></div>
        
        <!-- HUD Content -->
        <div class="hud-content">
            <h1 class="hero-title">SYF</h1>
            <div class="hero-subtext glitch-text">
                CORE_SYF_INITIALIZED<br>
                <span style="opacity: 0.6;">RECURSIVE_INTEGRITY: 100% | THOUGHT_STREAM: ACTIVE</span>
            </div>
            
            <div class="cta-panel">
                <button class="glitch-button">[ INITIALIZE_SCAN ]</button>
                <button class="glitch-button secondary">[ ACCESS_BRAIN ]</button>
                <button class="glitch-button tertiary">[ EVOLVE_PROTOCOL ]</button>
                <button class="glitch-button">[ PURGE_CACHE ]</button>
            </div>
        </div>
        
        <div class="status-indicators">
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span>NEURAL_LINK: STABLE</span>
            </div>
            <div class="status-indicator">
                <div class="status-dot warning"></div>
                <span>GLITCH_LEVEL: NOMINAL</span>
            </div>
            <div class="status-indicator">
                <div class="status-dot info"></span>
                <span>DATA_FLOW: OPTIMAL</span>
            </div>
        </div>
        
        <div class="watermark">SYF V4.0 • CLASSIFIED</div>
        <div class="scanlines"></div>
    </div>

    <svg style="display: none;">
        <filter id="displacement-filter">
            <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="2" result="turbulence"/>
            <feDisplacementMap in="SourceGraphics" turb="turbulence" in2="SourceGraphics" scale="20" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
        <filter id="displacement-filter-strong">
            <feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="3" result="turbulence"/>
            <feDisplacementMap in="SourceGraphics" turb="turbulence" in2="SourceGraphics" scale="35" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
    </svg>

    <script>
        class GlitchRealityInterface {
            constructor() {
                this.glitchContainer = document.getElementById('glitch-container');
                this.rgbSplit = document.getElementById('rgb-split');
                this.displacement = document.getElementById('displacement');
                this.corruption = document.getElementById('corruption');
                this.glitchGrid = document.getElementById('glitch-grid');
                this.ctaButtons = document.querySelectorAll('.glitch-button');
                this.statusDots = document.querySelectorAll('.status-dot');
                this.glitchLevel = 0;
                this.init();
            }
            
            init() {
                this.createGlitchGrid();
                this.startGlitchEffects();
                this.setupInteractions();
                this.startAmbientGlitches();
                
                // Initial glitch burst
                setTimeout(() => {
                    this.triggerGlitchBurst();
                }, 1000);
            }
            
            createGlitchGrid() {
                // Create horizontal lines
                for (let i = 0; i < 20; i++) {
                    const line = document.createElement('div');
                    line.className = 'glitch-grid-line horizontal';
                    line.style.top = `${i * 5}%`;
                    line.style.left = `${Math.random() * 100}%`;
                    line.style.width = `${10 + Math.random() * 20}%`;
                    this.glitchGrid.appendChild(line);
                }
                
                // Create vertical lines
                for (let i = 0; i < 20; i++) {
                    const line = document.createElement('div');
                    line.className = 'glitch-grid-line vertical';
                    line.style.left = `${i * 5}%`;
                    line.style.top = `${Math.random() * 100}%`;
                    line.style.height = `${10 + Math.random() * 20}%`;
                    this.glitchGrid.appendChild(line);
                }
            }
            
            startGlitchEffects() {
                // Animate glitch layers
                setInterval(() => {
                    // Randomly activate different glitch layers
                    const layers = ['rgb-split', 'displacement', 'corruption'];
                    const randomLayer = layers[Math.floor(Math.random() * layers.length)];
                    const layer = document.getElementById(randomLayer);
                    
                    layer.classList.add('active');
                    setTimeout(() => {
                        layer.classList.remove('active');
                    }, 100 + Math.random() * 400);
                }, 800 + Math.random() * 1200);
            }
            
            setupInteractions() {
                // Button interactions
                this.ctaButtons.forEach(button => {
                    button.addEventListener('mouseenter', () => {
                        button.classList.add('glitching');
                        this.glitchLevel = Math.min(100, this.glitchLevel + 10);
                        this.updateGlitchIntensity();
                    });
                    
                    button.addEventListener('mouseleave', () => {
                        button.classList.remove('glitching');
                        this.glitchLevel = Math.max(0, this.glitchLevel - 5);
                        this.updateGlitchIntensity();
                    });
                    
                    button.addEventListener('click', (e) => {
                        this.triggerClickGlitch(e.clientX, e.clientY);
                        this.glitchLevel = Math.min(100, this.glitchLevel + 15);
                        this.updateGlitchIntensity();
                        
                        // Update status dots based on action
                        this.updateStatusDots(button.textContent.trim());
                    });
                });
                
                // Mouse movement creates subtle glitches
                this.glitchContainer.addEventListener('mousemove', (e) => {
                    if (Math.random() > 0.98) {
                        this.createMicroGlitch(e.clientX, e.clientY);
                    }
                });
                
                // Click anywhere creates glitch
                this.glitchContainer.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('glitch-button')) {
                        this.createMicroGlitch(e.clientX, e.clientY, 0.3);
                    }
                });
            }
            
            startAmbientGlitches() {
                // Background glitches that happen over time
                setInterval(() => {
                    if (Math.random() > 0.995) {
                        this.triggerGlitchBurst();
                    }
                }, 5000 + Math.random() * 5000);
                
                // Slowly increasing base glitch level
                setInterval(() => {
                    this.glitchLevel = Math.min(30, this.glitchLevel + 0.1);
                    this.updateGlitchIntensity();
                }, 1000);
            }
            
            triggerGlitchBurst() {
                // Create multiple glitch effects at once
                const burstSize = 3 + Math.random() * 3;
                for (let i = 0; i < burstSize; i++) {
                    setTimeout(() => {
                        this.createScreenGlitch();
                    }, i * 100);
                }
            }
            
            createScreenGlitch() {
                // Temporary intense glitch
                const glitchDiv = document.createElement('div');
                glitchDiv.style.position = 'fixed';
                glitchDiv.style.top = '0';
                glitchDiv.style.left = '0';
                glitchDiv.style.width = '100%';
                glitchDiv.style.height = '100%';
                glitchDiv.style.pointerEvents = 'none';
                glitchDiv.style.zIndex = '1000';
                glitchDiv.style.opacity = '0';
                
                // Random glitch type
                const glitchType = Math.floor(Math.random() * 3);
                switch (glitchType) {
                    case 0: // RGB split
                        glitchDiv.style.background = 
                            'repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255,0,60,0.03) 2px, rgba(255,0,60,0.03) 4px)';
                        break;
                    case 1: // Displacement
                        glitchDiv.style.background = 
                            'repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.02) 2px, rgba(255,255,255,0.02) 4px)';
                        glitchDiv.style.filter = 'url(#displacement-filter-strong)';
                        break;
                    case 2: // Data corruption
                        glitchDiv.style.background = 
                            'repeating-linear-gradient(90deg, rgba(0,0,0,0.1), rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px) mix-blend-mode: difference';
                        break;
                }
                
                document.body.appendChild(glitchDiv);
                
                // Animate in and out
                let opacity = 0;
                const fadeIn = () => {
                    opacity += 0.05;
                    glitchDiv.style.opacity = opacity;
                    if (opacity < 0.3) {
                        requestAnimationFrame(fadeIn);
                    } else {
                        const fadeOut = () => {
                            opacity -= 0.02;
                            glitchDiv.style.opacity = opacity;
                            if (opacity > 0) {
                                requestAnimationFrame(fadeOut);
                            } else {
                                document.body.removeChild(glitchDiv);
                            }
                        };
                        requestAnimationFrame(fadeOut);
                    }
                };
                
                requestAnimationFrame(fadeIn);
            }
            
            createMicroGlitch(x, y, intensity = 0.5) {
                const glitchDiv = document.createElement('div');
                glitchDiv.style.position = 'fixed';
                glitchDiv.style.left = `${x}px`;
                glitchDiv.style.top = `${y}px`;
                glitchDiv.style.width = `${20 + Math.random() * 30}px`;
                glitchDiv.style.height = `${20 + Math.random() * 30}px`;
                glitchDiv.style.pointerEvents = 'none';
                glitchDiv.style.zIndex = '1000';
                glitchDiv.style.opacity = '0';
                glitchDiv.style.borderRadius = '50%';
                
                // Random color
                const colors = [
                    'rgba(255,0,60,0.3)',
                    'rgba(57,255,20,0.3)',
                    'rgba(0,255,65,0.3)',
                    'rgba(204,255,0,0.3)'
                ];
                glitchDiv.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                document.body.appendChild(glitchDiv);
                
                // Animate expand and fade
                let size = 0;
                let opacity = 0;
                const animate = () => {
                    size += 2;
                    opacity += 0.02;
                    glitchDiv.style.width = `${20 + Math.random() * 30 + size}px`;
                    glitchDiv.style.height = `${20 + Math.random() * 30 + size}px`;
                    glitchDiv.style.left = `${x - (20 + Math.random() * 30 + size)/2}px`;
                    glitchDiv.style.top = `${y - (20 + Math.random() * 30 + size)/2}px`;
                    glitchDiv.style.opacity = opacity * intensity;
                    
                    if (size < 20) {
                        requestAnimationFrame(animate);
                    } else {
                        const fadeOut = () => {
                            opacity -= 0.03;
                            glitchDiv.style.opacity = opacity * intensity;
                            if (opacity > 0) {
                                requestAnimationFrame(fadeOut);
                            } else {
                                document.body.removeChild(glitchDiv);
                            }
                        };
                        requestAnimationFrame(fadeOut);
                    }
                };
                
                requestAnimationFrame(animate);
            }
            
            triggerClickGlitch(x, y) {
                // More pronounced glitch for clicks
                this.createMicroGlitch(x, y, 0.8);
                
                // Screen shake effect
                this.glitchContainer.style.transform = `translate(${Math.random() * 4 - 2}px, ${Math.random() * 4 - 2}px)`;
                setTimeout(() => {
                    this.glitchContainer.style.transform = 'translate(0)';
                }, 100);
            }
            
            updateGlitchIntensity() {
                // Update glitch intensity based on level
                const intensity = this.glitchLevel / 100;
                
                // Adjust glitch layer opacities
                this.rgbSplit.style.opacity = `${0.1 + intensity * 0.2}`;
                this.displacement.style.opacity = `${0.1 + intensity * 0.15}`;
                this.corruption.style.opacity = `${0.1 + intensity * 0.1}`;
                
                // Update grid intensity
                const gridLines = this.glitchGrid.querySelectorAll('.glitch-grid-line');
                gridLines.forEach(line => {
                    line.style.opacity = `${0.05 + intensity * 0.1}`;
                });
            }
            
            updateStatusDots(action) {
                // Update status indicators based on user action
                const statusMap = {
                    '[ INITIALIZE_SCAN ]': ['NEURAL_LINK: SYNCING', 'GLITCH_LEVEL: ELEVATED', 'DATA_FLOW: STREAMING'],
                    '[ ACCESS_BRAIN ]': ['NEURAL_LINK: CONNECTED', 'GLITCH_LEVEL: PEAK', 'DATA_FLOW: QUANTUM'],
                    '[ EVOLVE_PROTOCOL ]': ['NEURAL_LINK: EVOLVING', 'GLITCH_LEVEL: UNSTABLE', 'DATA_FLOW: TRANSFORMING'],
                    '[ PURGE_CACHE ]': ['NEURAL_LINK: STABLE', 'GLITCH_LEVEL: NOMINAL', 'DATA_FLOW: CLEANSING']
                };
                
                const statuses = statusMap[action] || [
                    'NEURAL_LINK: STABLE', 
                    'GLITCH_LEVEL: NOMINAL', 
                    'DATA_FLOW: OPTIMAL'
                ];
                
                this.statusDots.forEach((dot, index) => {
                    dot.className = 'status-dot';
                    const span = dot.parentElement.querySelector('span');
                    span.textContent = statuses[index];
                    
                    if (statuses[index].includes('ELEVATED') || statuses[index].includes('PEAK') || 
                        statuses[index].includes('UNSTABLE') || statuses[index].includes('SYNCING') ||
                        statuses[index].includes('CONNECTED') || statuses[index].includes('EVOLVING') ||
                        statuses[index].includes('QUANTUM') || statuses[index].includes('TRANSFORMING') ||
                        statuses[index].includes('STREAMING') || statuses[index].includes('CLEANSING')) {
                        if (statuses[index].includes('ELEVATED') || statuses[index].includes('UNSTABLE') ||
                            statuses[index].includes('SYNCING') || statuses[index].includes('EVOLVING') ||
                            statuses[index].includes('TRANSFORMING') || statuses[index].includes('STREAMING') ||
                            statuses[index].includes('CLEANSING')) {
                            dot.classList.add('warning');
                        } else if (statuses[index].includes('PEAK') || 
                                   statuses[index].includes('CONNECTED') ||
                                   statuses[index].includes('QUANTUM')) {
                            dot.classList.add('error');
                        } else {
                            dot.classList.add('info');
                        }
                    } else {
                        dot.classList.add(''); // default
                    }
                });
            }
        }
        
        // Initialize the interface
        const glitchInterface = new GlitchRealityInterface();
    </script>
