<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYF V4 - Quantum Data Cascade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --void-black: #050505;
            --quantum-cyan: #00FFFF;
            --quantum-magenta: #FF00FF;
            --quantum-yellow: #FFFF00;
            --void-purple: #4B0082;
            --font-display: 'Orbitron', monospace;
            --font-mono: 'JetBrains Mono', monospace;
            --font-quantum: 'Courier New', monospace;
        }
        
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            background-color: var(--void-black);
            color: var(--quantum-cyan);
            font-family: var(--font-mono);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        #cascade-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at center, rgba(0, 255, 255, 0.05) 0%, transparent 70%);
        }
        
        #quantum-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .data-particle {
            position: absolute;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
        }
        
        .data-particle.type-info { background: var(--quantum-cyan); }
        .data-particle.type-warning { background: var(--quantum-yellow); }
        .data-particle.type-error { background: var(--quantum-magenta); }
        .data-particle.type-core { background: var(--void-purple); }
        
        .data-stream {
            position: absolute;
            pointer-events: none;
            z-index: 3;
        }
        
        .data-stream.type-vertical {
            width: 2px;
            background: var(--quantum-cyan);
            animation: streamFlow 3s linear infinite;
        }
        
        .data-stream.type-horizontal {
            height: 2px;
            background: var(--quantum-yellow);
            animation: streamFlow 3s linear infinite;
        }
        
        .data-stream.type-diagonal {
            width: 2px;
            height: 2px;
            background: var(--quantum-magenta);
            animation: streamFlow 3s linear infinite;
        }
        
        @keyframes streamFlow {
            0% { transform: translateY(0); }
            100% { transform: translateY(100vh); }
        }
        
        .hud-node {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(5, 5, 5, 0.6);
            border: 2px solid;
            border-radius: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
            transition: all 0.4s ease;
            cursor: pointer;
            z-index: 10;
            font-family: var(--font-display);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.8rem;
        }
        
        .hud-node.type-info { border-color: var(--quantum-cyan); color: var(--quantum-cyan); }
        .hud-node.type-warning { border-color: var(--quantum-yellow); color: var(--quantum-yellow); }
        .hud-node.type-error { border-color: var(--quantum-magenta); color: var(--quantum-magenta); }
        .hud-node.type-core { border-color: var(--void-purple); color: var(--void-purple); }
        
        .hud-node:hover {
            transform: scale(1.2) rotate(5deg);
            box-shadow: 0 0 25px currentColor;
            background: rgba(5, 5, 5, 0.8);
        }
        
        .hud-node.active {
            width: 80px;
            height: 80px;
            font-size: 1rem;
            box-shadow: 0 0 30px currentColor, 0 0 40px currentColor;
            animation: nodePulse 2s ease-in-out infinite;
        }
        
        .hud-node-icon {
            font-size: 1.8rem;
            margin-bottom: 0.3rem;
            display: block;
        }
        
        .hud-node-label {
            font-weight: 700;
        }
        
        .hud-node-status {
            font-size: 0.7rem;
            opacity: 0.8;
            margin-top: 0.3rem;
            font-family: var(--font-mono);
        }
        
        .hero-title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 15;
            font-family: var(--font-display);
            font-size: clamp(8rem, 25vw, 18rem);
            font-weight: 900;
            letter-spacing: -0.02em;
            text-shadow: 
                0 0 5px var(--quantum-cyan),
                0 0 10px var(--quantum-cyan),
                0 0 15px var(--quantum-cyan);
            margin: 0;
            opacity: 0.8;
        }
        
        .hero-title::after {
            content: attr(data-content);
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-top: 1rem;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--quantum-yellow);
            text-transform: uppercase;
            white-space: nowrap;
        }
        
        .cta-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border: 2px solid var(--quantum-cyan);
            border-radius: 50%;
            pointer-events: none;
            z-index: 12;
            opacity: 0;
        }
        
        .cta-ring.active {
            animation: ringExpand 1.5s ease-out forwards;
        }
        
        @keyframes ringExpand {
            0% {
                width: 0px;
                height: 0px;
                opacity: 0.7;
            }
            100% {
                width: 200px;
                height: 200px;
                opacity: 0;
            }
        }
        
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 255, 255, 0.03) 2px,
                    rgba(0, 255, 255, 0.03) 4px
                );
            animation: scanMove 4s linear infinite;
        }
        
        @keyframes scanMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(100vh); }
        }
        
        .quantum-footer {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1.5rem;
            font-size: 0.9rem;
            opacity: 0.6;
            font-family: var(--font-display);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        .quantum-footer a {
            color: var(--quantum-cyan);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s ease;
        }
        
        .quantum-footer a:hover {
            border-bottom-color: var(--quantum-cyan);
        }
        
        .watermark {
            position: absolute;
            top: 2rem;
            right: 2rem;
            font-size: 0.8rem;
            opacity: 0.3;
            font-family: var(--font-mono);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        
        @media (max-width: 768px) {
            .hero-title {
                font-size: clamp(5rem, 20vw, 12rem);
            }
            
            .hero-title::after {
                font-size: 1.2rem;
            }
            
            .cta-ring {
                width: 150px;
                height: 150px;
            }
            
            .quantum-footer {
                bottom: 1rem;
                font-size: 0.8rem;
            }
            
            .watermark {
                top: 1rem;
                right: 1rem;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div id="quantum-canvas"></div>
    
    <div class="hero-title" data-content="RECURSIVE_INTEGRITY: 100% | THOUGHT_STREAM: ACTIVE">
        SYF
    </div>
    
    <div class="cta-ring" id="cta-ring"></div>
    
    <div class="quantum-footer">
        <a href="#">[ INITIALIZE_SCAN ]</a>
        <a href="#">[ ACCESS_BRAIN ]</a>
        <a href="#">[ EVOLVE_PROTOCOL ]</a>
        <a href="#">[ PURGE_CACHE ]</a>
    </div>
    
    <div class="watermark">SYF V4.0 • QUANTUM CASCADE</div>
    <div class="scanlines"></div>

    <script>
        class QuantumDataCascade {
            constructor() {
                this.canvas = document.getElementById('quantum-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.particulates = [];
                this.streams = [];
                this.nodes = [];
                this.mouse = { x: 0, y: 0, radius: 100 };
                this.ctaRing = document.getElementById('cta-ring');
                this.init();
            }
            
            init() {
                this.resize();
                this.createParticleSystem();
                this.createDataStreams();
                this.createHUDNodes();
                this.setupEventListeners();
                this.animate();
                
                // Initial cascade effect
                setTimeout(() => {
                    this.triggerQuantumBurst();
                }, 1000);
            }
            
            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }
            
            createParticleSystem() {
                // Create initial quantum particles
                for (let i = 0; i < 200; i++) {
                    this.particulates.push(this.createParticle());
                }
            }
            
            createParticle() {
                const types = ['info', 'warning', 'error', 'core'];
                const type = types[Math.floor(Math.random() * types.length)];
                
                return {
                    x: Math.random() * this.canvas.width,
                    y: Math.random() * this.canvas.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    size: Math.random() * 2 + 0.5,
                    type: type,
                    color: this.getParticleColor(type),
                    life: Math.random() * 100 + 50,
                    maxLife: Math.random() * 100 + 50,
                    pulseOffset: Math.random() * Math.PI * 2,
                    quantumState: Math.random() > 0.5 ? 1 : -1 // Superposition state
                };
            }
            
            getParticleColor(type) {
                switch (type) {
                    case 'info': return 'var(--quantum-cyan)';
                    case 'warning': return 'var(--quantum-yellow)';
                    case 'error': return 'var(--quantum-magenta)';
                    case 'core': return 'var(--void-purple)';
                    default: return 'var(--quantum-cyan)';
                }
            }
            
            createDataStreams() {
                // Create flowing data streams
                for (let i = 0; i < 20; i++) {
                    const streamType = Math.random() > 0.5 ? 'vertical' : 
                                    (Math.random() > 0.5 ? 'horizontal' : 'diagonal');
                    
                    this.streams.push({
                        type: streamType,
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        length: Math.random() * 100 + 50,
                        speed: Math.random() * 2 + 0.5,
                        color: this.getStreamColor(streamType),
                        quantumPhase: Math.random() * Math.PI * 2
                    });
                }
            }
            
            getStreamColor(type) {
                switch (type) {
                    case 'vertical': return 'var(--quantum-cyan)';
                    case 'horizontal': return 'var(--quantum-yellow)';
                    case 'diagonal': return 'var(--quantum-magenta)';
                    default: return 'var(--quantum-cyan)';
                }
            }
            
            createHUDNodes() {
                // Create HUD nodes in a circular pattern
                const centerX = this.canvas.width / 2;
                const centerY = this.canvas.height / 2;
                const radius = Math.min(this.canvas.width, this.canvas.height) * 0.3;
                const nodeCount = 6;
                
                const nodeTypes = [
                    { type: 'info', label: 'INIT_SCAN', icon: '▶️' },
                    { type: 'warning', label: 'ACCESS_BR', icon: '🧠' },
                    { type: 'error', label: 'EVOLVE_PRO', icon: '⚡' },
                    { type: 'core', label: 'PURGE_CCH', icon: '🗑️' },
                    { type: 'info', label: 'DATA_VAULT', icon: '🔒' },
                    { type: 'warning', label: 'SYS_LOGS', icon: '📜' }
                ];
                
                for (let i = 0; i < nodeCount; i++) {
                    const angle = (i / nodeCount) * Math.PI * 2;
                    const node = {
                        x: centerX + Math.cos(angle) * radius,
                        y: centerY + Math.sin(angle) * radius,
                        type: nodeTypes[i].type,
                        label: nodeTypes[i].label,
                        icon: nodeTypes[i].icon,
                        size: 60,
                        active: false,
                        pulseOffset: Math.random() * Math.PI * 2
                    };
                    
                    this.nodes.push(node);
                }
            }
            
            setupEventListeners() {
                window.addEventListener('resize', () => this.resize());
                
                window.addEventListener('mousemove', (e) => {
                    this.mouse.x = e.x;
                    this.mouse.y = e.y;
                });
                
                window.addEventListener('touchmove', (e) => {
                    if (e.touches.length > 0) {
                        this.mouse.x = e.touches[0].clientX;
                        this.mouse.y = e.touches[0].clientY;
                    }
                }, { passive: true });
                
                // Click effect on canvas
                this.canvas.addEventListener('click', (e) => {
                    this.triggerQuantumBurst(e.offsetX, e.offsetY);
                    
                    // Check if click hit a node
                    const hitNode = this.checkNodeHit(e.offsetX, e.offsetY);
                    if (hitNode) {
                        this.activateNode(hitNode);
                    }
                });
            }
            
            checkNodeHit(x, y) {
                return this.nodes.find(node => {
                    const dx = node.x - x;
                    const dy = node.y - y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    return distance < node.size / 2;
                })?.type || null;
            }
            
            activateNode(type) {
                const node = this.nodes.find(n => n.type === type);
                if (node) {
                    node.active = true;
                }
            }
            
            updateParticulates() {
                this.particulates.forEach((particle, index) => {
                    // Move particle
                    particle.x += particle.vx;
                    particle.y += particle.vy;
                    
                    // Quantum uncertainty (random movement)
                    if (Math.random() > 0.95) {
                        particle.vx += (Math.random() - 0.5) * 0.2;
                        particle.vy += (Math.random() - 0.5) * 0.2;
                    }
                    
                    // Mouse repulsion/attraction based on quantum state
                    const dx = this.mouse.x - particle.x;
                    const dy = this.mouse.y - particle.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < this.mouse.radius) {
                        const force = (1 - distance / this.mouse.radius) * 0.5;
                        const angle = Math.atan2(dy, dx);
                        
                        // Quantum effect: sometimes attract, sometimes repel
                        if (particle.quantumState > 0) {
                            // Attract
                            particle.vx -= Math.cos(angle) * force;
                            particle.vy -= Math.sin(angle) * force;
                        } else {
                            // Repel
                            particle.vx += Math.cos(angle) * force;
                            particle.vy += Math.sin(angle) * force;
                        }
                    }
                    
                    // Life decay
                    particle.life--;
                    if (particle.life <= 0) {
                        this.particulates[index] = this.createParticle();
                    }
                    
                    // Boundary wrapping with quantum tunneling
                    if (particle.x < -10) {
                        if (Math.random() > 0.7) { // Quantum tunneling chance
                            particle.x = this.canvas.width + 10;
                        } else {
                            particle.x = this.canvas.width + 10;
                        }
                    }
                    if (particle.x > this.canvas.width + 10) {
                        if (Math.random() > 0.7) {
                            particle.x = -10;
                        } else {
                            particle.x = -10;
                        }
                    }
                    if (particle.y < -10) {
                        if (Math.random() > 0.7) {
                            particle.y = this.canvas.height + 10;
                        } else {
                            particle.y = this.canvas.height + 10;
                        }
                    }
                    if (particle.y > this.canvas.height + 10) {
                        if (Math.random() > 0.7) {
                            particle.y = -10;
                        } else {
                            particle.y = -10;
                        }
                    }
                });
            }
            
            updateStreams() {
                this.streams.forEach(stream => {
                    // Move stream
                    if (stream.type === 'vertical') {
                        stream.y += stream.speed;
                        if (stream.y > this.canvas.height + stream.length) {
                            stream.y = -stream.length;
                        }
                    } else if (stream.type === 'horizontal') {
                        stream.x += stream.speed;
                        if (stream.x > this.canvas.width + stream.length) {
                            stream.x = -stream.length;
                        }
                    } else { // diagonal
                        stream.x += Math.cos(stream.quantumPhase) * stream.speed;
                        stream.y += Math.sin(stream.quantumPhase) * stream.speed;
                        
                        if (stream.x > this.canvas.width + stream.length || 
                            stream.y > this.canvas.height + stream.length ||
                            stream.x < -stream.length || 
                            stream.y < -stream.length) {
                            // Reset to random position
                            stream.x = Math.random() * this.canvas.width;
                            stream.y = Math.random() * this.canvas.height;
                        }
                    }
                    
                    // Quantum phase shift
                    stream.quantumPhase += 0.01;
                });
            }
            
            updateNodes() {
                this.nodes.forEach(node => {
                    // Node pulse effect
                    const pulse = Math.sin(Date.now() * 0.002 + node.pulseOffset) * 0.3 + 0.7;
                    
                    // Scale based on activity
                    const baseSize = node.active ? 80 : 60;
                    const pulseSize = baseSize + (pulse * 10);
                    node.size = pulseSize;
                    
                    // Quantum fluctuation for inactive nodes
                    if (!node.active && Math.random() > 0.99) {
                        node.x += (Math.random() - 0.5) * 5;
                        node.y += (Math.random() - 0.5) * 5;
                    }
                });
            }
            
            triggerQuantumBurst(x = this.canvas.width / 2, y = this.canvas.height / 2) {
                // Create a burst of particles at the click location
                const burstCount = 50 + Math.random() * 50;
                for (let i = 0; i < burstCount; i++) {
                    const angle = (i / burstCount) * Math.PI * 2;
                    const speed = Math.random() * 2 + 1;
                    
                    this.particulates.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        size: Math.random() * 2 + 0.5,
                        type: Math.random() > 0.5 ? 'info' : 'warning',
                        color: this.getParticleColor(Math.random() > 0.5 ? 'info' : 'warning'),
                        life: Math.random() * 30 + 20,
                        maxLife: Math.random() * 30 + 20,
                        pulseOffset: Math.random() * Math.PI * 2,
                        quantumState: Math.random() > 0.5 ? 1 : -1
                    });
                }
            }
            
            drawParticulates() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.particulates.forEach(particle => {
                    this.ctx.beginPath();
                    this.ctx.arc(particle.x, particle.y, particle.size / 2, 0, Math.PI * 2);
                    
                    // Quantum flicker effect
                    const alpha = 0.5 + Math.sin(Date.now() * 0.005 + particle.pulseOffset) * 0.3;
                    this.ctx.fillStyle = `${particle.color}) / 1, ${alpha})`; // This won't work, let me fix it
                    
                    // Proper way to handle alpha with CSS variables
                    const colorMap = {
                        '--quantum-cyan': '0, 255, 255',
                        '--quantum-yellow': '255, 255, 0',
                        '--quantum-magenta': '255, 0, 255',
                        '--void-purple': '75, 0, 130'
                    };
                    
                    // Extract RGB values from CSS variable (simplified)
                    let rgb = '0, 255, 255'; // default to cyan
                    if (particle.color.includes('--quantum-yellow')) rgb = '255, 255, 0';
                    else if (particle.color.includes('--quantum-magenta')) rgb = '255, 0, 255';
                    else if (particle.color.includes('--void-purple')) rgb = '75, 0, 130';
                    
                    this.ctx.fillStyle = `rgba(${rgb}, ${alpha})`;
                    this.ctx.fill();
                });
            }
            
            drawStreams() {
                this.streams.forEach(stream => {
                    this.ctx.beginStrokeStyle = this.getStreamColor(stream.type);
                    this.ctx.lineWidth = 1;
                    
                    if (stream.type === 'vertical') {
                        this.ctx.beginPath();
                        this.ctx.moveTo(stream.x, stream.y);
                        this.ctx.lineTo(stream.x, stream.y + stream.length);
                        this.ctx.stroke();
                    } else if (stream.type === 'horizontal') {
                        this.ctx.beginPath();
                        this.ctx.moveTo(stream.x, stream.y);
                        this.ctx.lineTo(stream.x + stream.length, stream.y);
                        this.ctx.stroke();
                    } else { // diagonal
                        this.ctx.beginPath();
                        this.ctx.moveTo(stream.x, stream.y);
                        const endX = stream.x + Math.cos(stream.quantumPhase) * stream.length;
                        const endY = stream.y + Math.sin(stream.quantumPhase) * stream.length;
                        this.ctx.lineTo(endX, endY);
                        this.ctx.stroke();
                    }
                });
            }
            
            drawNodes() {
                this.nodes.forEach(node => {
                    // Draw node background
                    this.ctx.fillStyle = 'rgba(5, 5, 5, 0.6)';
                    this.ctx.fillRect(node.x - node.size/2, node.y - node.size/2, node.size, node.size);
                    
                    // Draw node border
                    this.ctx.strokeStyle = this.getParticleColor(node.type);
                    this.ctx.lineWidth = 2;
                    this.ctx.strokeRect(node.x - node.size/2, node.y - node.size/2, node.size, node.size);
                    
                    // Draw node icon (simplified as text)
                    this.ctx.fillStyle = this.getParticleColor(node.type);
                    this.ctx.font = '16px "Orbitron"';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    this.ctx.fillText(node.icon, node.x, node.y - 4);
                    
                    // Draw node label
                    this.ctx.font = '10px "Orbitron"';
                    this.ctx.fillText(node.label, node.x, node.y + 8);
                });
            }
            
            animate() {
                this.updateParticulates();
                this.updateStreams();
                this.updateNodes();
                
                this.drawParticulates();
                this.drawStreams();
                this.drawNodes();
                
                requestAnimationFrame(() => this.animate());
            }
        }
        
        // Initialize the quantum cascade
        const quantumCascade = new QuantumDataCascade();
    </script>
</body>
</html>
