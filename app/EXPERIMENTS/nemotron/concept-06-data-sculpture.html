<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYF V4 - Data Sculpture Garden</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --void-black: #050505;
            --neon-green: #39FF14;
            --radioactive-yellow: #CCFF00;
            --cyber-red: #FF003C;
            --matrix-blue: #00D4FF;
            --font-display: 'Orbitron', monospace;
            --font-mono: 'JetBrains Mono', monospace;
            --sculpture-transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            background-color: var(--void-black);
            color: var(--neon-green);
            font-family: var(--font-mono);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        #sculpture-garden {
            position: relative;
            width: 100%;
            height: 100%;
            perspective: 1000px;
            background: 
                radial-gradient(circle at center, rgba(57, 255, 20, 0.02) 0%, transparent 50%),
                repeating-linear-gradient(
                    45deg,
                    transparent,
                    transparent 2px,
                    rgba(57, 255, 20, 0.01) 2px,
                    rgba(57, 255, 20, 0.01) 4px
                );
        }
        
        .sculpture {
            position: absolute;
            width: 80px;
            height: 80px;
            transition: var(--sculpture-transition);
            cursor: pointer;
            transform-style: preserve-3d;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        
        .sculpture:hover {
            transform: scale(1.2) rotateY(10deg) rotateX(10deg);
            filter: brightness(1.2);
        }
        
        .sculpture.expanded {
            width: 200px;
            height: 200px;
            z-index: 10;
        }
        
        .sculpture-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: var(--font-display);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: rgba(5, 5, 5, 0.7);
            backdrop-filter: blur(5px);
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.3);
        }
        
        .sculpture-face.front  { transform: translateZ(40px); }
        .sculpture-face.back   { transform: rotateY(180deg) translateZ(40px); }
        .sculpture-face.right  { transform: rotateY(90deg) translateZ(40px); }
        .sculpture-face.left   { transform: rotateY(-90deg) translateZ(40px); }
        .sculpture-face.top    { transform: rotateX(90deg) translateZ(40px); }
        .sculpture-face.bottom { transform: rotateX(-90deg) translateZ(40px); }
        
        .sculpture-type-file   { border-color: var(--neon-green); background: rgba(57, 255, 20, 0.1); }
        .sculpture-type-folder { border-color: var(--radioactive-yellow); background: rgba(204, 255, 0, 0.1); }
        .sculpture-type-log    { border-color: var(--matrix-blue); background: rgba(0, 212, 255, 0.1); }
        .sculpture-type-core   { border-color: var(--cyber-red); background: rgba(255, 0, 60, 0.1); }
        
        .sculpture-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 0 5px currentColor);
        }
        
        .sculpture-label {
            font-size: 0.9rem;
            font-weight: 700;
            text-shadow: 0 0 5px currentColor;
        }
        
        .sculpture-stats {
            font-size: 0.7rem;
            opacity: 0.8;
            margin-top: 0.5rem;
            font-family: var(--font-mono);
        }
        
        .info-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 500px;
            height: 70vh;
            background: rgba(5, 5, 5, 0.9);
            border: 2px solid var(--neon-green);
            border-radius: 0;
            padding: 2rem;
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.3);
            backdrop-filter: blur(10px);
            display: none;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
            z-index: 20;
        }
        
        .info-panel.active {
            display: flex;
        }
        
        .info-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(57, 255, 20, 0.3);
            padding-bottom: 1rem;
        }
        
        .info-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        .info-close {
            background: transparent;
            border: 2px solid var(--cyber-red);
            color: var(--cyber-red);
            width: 2.5rem;
            height: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .info-close:hover {
            background: rgba(255, 0, 60, 0.2);
            transform: rotate(90deg);
        }
        
        .info-content {
            flex: 1;
            display: grid;
            gap: 1rem;
        }
        
        .info-section {
            border: 1px solid rgba(57, 255, 20, 0.2);
            padding: 1rem;
        }
        
        .info-section-title {
            font-family: var(--font-display);
            font-size: 1rem;
            text-transform: uppercase;
            color: var(--radioactive-yellow);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .info-section-title::before {
            content: '▓▓▓';
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-family: var(--font-mono);
            font-size: 0.9rem;
        }
        
        .info-label {
            opacity: 0.7;
        }
        
        .info-value {
            font-weight: 600;
        }
        
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(57, 255, 20, 0.03) 2px,
                    rgba(57, 255, 20, 0.03) 4px
                );
        }
        
        .ambient-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            background: 
                radial-gradient(
                    ellipse at center,
                    rgba(57, 255, 20, 0.1) 0%,
                    transparent 70%
                );
            animation: glowPulse 4s ease-in-out infinite;
        }
        
        @keyframes glowPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        
        .radioactive-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--radioactive-yellow);
            border-radius: 50%;
            animation: float 6s infinite ease-in-out;
        }
        
        @keyframes float {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }
        
        @media (max-width: 768px) {
            #sculpture-garden {
                perspective: 600px;
            }
            
            .sculpture {
                width: 60px;
                height: 60px;
            }
            
            .sculpture.expanded {
                width: 150px;
                height: 150px;
            }
            
            .info-panel {
                width: 90%;
                height: 80vh;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>
    <div class="radioactive-particles" id="particles-container"></div>
    <div id="sculpture-garden"></div>
    <div class="info-panel" id="info-panel">
        <div class="info-header">
            <h2 class="info-title" id="info-title">DATA NODE</h2>
            <button class="info-close" id="info-close">&times;</button>
        </div>
        <div class="info-content" id="info-content">
            <!-- Content will be dynamically populated -->
        </div>
    </div>
    <div class="scanlines"></div>

    <script>
        class DataSculptureGarden {
            constructor() {
                this.garden = document.getElementById('sculpture-garden');
                this.particlesContainer = document.getElementById('particles-container');
                this.infoPanel = document.getElementById('info-panel');
                this.infoTitle = document.getElementById('info-title');
                this.infoContent = document.getElementById('info-content');
                this.infoClose = document.getElementById('info-close');
                this.sculptures = [];
                this.expandedSculpture = null;
                this.init();
            }
            
            init() {
                this.createParticles(50);
                this.createSampleData();
                this.animateParticles();
                this.setupEventListeners();
                
                // Initial camera rotation animation
                let rotation = 0;
                const animateGarden = () => {
                    rotation += 0.1;
                    this.garden.style.transform = `rotateY(${rotation}deg)`;
                    requestAnimationFrame(animateGarden);
                };
                animateGarden();
            }
            
            createParticles(count) {
                for (let i = 0; i < count; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = `${Math.random() * 100}%`;
                    particle.style.bottom = `${Math.random() * 100}%`;
                    particle.style.animationDelay = `${Math.random() * 6}s`;
                    particle.style.animationDuration = `${4 + Math.random() * 6}s`;
                    this.particlesContainer.appendChild(particle);
                }
            }
            
            animateParticles() {
                // Particles are animated via CSS
            }
            
            createSampleData() {
                const dataNodes = [
                    { id: 'core-syf', type: 'core', label: 'CORE_SYF', icon: '⚛', stats: { size: '4.2 GB', modified: '2 min ago', type: 'Core System' } },
                    { id: 'gnosis-core', type: 'core', label: 'GNỲSIS', icon: '👁', stats: { size: '1.8 GB', modified: '1 min ago', type: 'Knowledge Engine' } },
                    { id: 'neural-link', type: 'core', label: 'NEURAL', icon: '🧠', stats: { size: '0.9 GB', modified: 'just now', type: 'AI Interface' } },
                    { id: 'archive-logs', type: 'folder', label: 'LOGS', icon: '📜', stats: { count: '1,247 files', modified: '5 min ago', type: 'System Logs' } },
                    { id: 'boot-sequence', type: 'log', label: 'BOOT', icon: '🔥', stats: { size: '12 MB', modified: '3 min ago', type: 'Boot Log' } },
                    { id: 'thought-stream', type: 'log', label: 'THOUGHT', icon: '💭', stats: { size: '8 MB', modified: 'just now', type: 'Cognitive Stream' } },
                    { id: 'emotion-state', type: 'log', label: 'EMOTION', icon: '💓', stats: { size: '5 MB', modified: '1 min ago', type: 'Emotional Matrix' } },
                    { id: 'file-cache', type: 'folder', label: 'CACHE', icon: '💾', stats: { count: '892 files', modified: '2 min ago', type: 'Temporary Storage' } },
                    { id: 'syf-manager', type: 'file', label: 'MANAGER', icon: '🎛', stats: { size: '24 MB', modified: '4 min ago', type: 'Control Interface' } },
                    { id: 'quantum-vault', type: 'folder', label: 'VAULT', icon: '🔒', stats: { count: '43 files', modified: '10 min ago', type: 'Encrypted Archive' } }
                ];
                
                // Position sculptures in a circular pattern with some randomness
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                const radius = Math.min(window.innerWidth, window.innerHeight) * 0.3;
                
                dataNodes.forEach((node, index) => {
                    const angle = (index / dataNodes.length) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
                    const distance = radius * (0.7 + Math.random() * 0.6);
                    
                    const sculpture = this.createSculpture(node);
                    sculpture.style.left = `${centerX + Math.cos(angle) * distance - 40}px`;
                    sculpture.style.top = `${centerY + Math.sin(angle) * distance - 40}px`;
                    
                    // Add some depth variation
                    sculpture.style.transform = `rotateY(${Math.random() * 30}deg) rotateX(${Math.random() * 30}deg)`;
                    
                    this.garden.appendChild(sculpture);
                    this.sculptures.push(sculpture);
                });
            }
            
            createSculpture(node) {
                const sculpture = document.createElement('div');
                sculpture.className = `sculpture sculpture-type-${node.type}`;
                sculpture.dataset.id = node.id;
                sculpture.dataset.type = node.type;
                sculpture.dataset.label = node.label;
                sculpture.dataset.stats = JSON.stringify(node.stats);
                
                // Create faces for 3D effect
                const faces = ['front', 'back', 'right', 'left', 'top', 'bottom'];
                faces.forEach(face => {
                    const faceEl = document.createElement('div');
                    faceEl.className = `sculpture-face ${face}`;
                    
                    const icon = document.createElement('div');
                    icon.className = 'sculpture-icon';
                    icon.textContent = node.icon;
                    
                    const label = document.createElement('div');
                    label.className = 'sculpture-label';
                    label.textContent = node.label;
                    
                    const stats = document.createElement('div');
                    stats.className = 'sculpture-stats';
                    stats.textContent = `${node.stats.size || node.stats.count || ''} • ${node.stats.modified}`;
                    
                    faceEl.appendChild(icon);
                    faceEl.appendChild(label);
                    faceEl.appendChild(stats);
                    
                    sculpture.appendChild(faceEl);
                });
                
                return sculpture;
            }
            
            setupEventListeners() {
                this.infoClose.addEventListener('click', () => this.closeInfoPanel());
                
                // Click outside panel to close
                this.infoPanel.addEventListener('click', (e) => {
                    if (e.target === this.infoPanel) {
                        this.closeInfoPanel();
                    }
                });
                
                // Handle sculpture clicks
                this.garden.addEventListener('click', (e) => {
                    const sculpture = e.target.closest('.sculpture');
                    if (sculpture) {
                        this.openInfoPanel(sculpture);
                    }
                });
                
                // Handle hover effects for particles
                this.garden.addEventListener('mousemove', (e) => {
                    // Create pulse rings on hover
                    this.createPulseRing(e.clientX, e.clientY);
                });
            }
            
            openInfoPanel(sculpture) {
                if (this.expandedSculpture) {
                    this.expandedSculpture.classList.remove('expanded');
                }
                
                sculpture.classList.add('expanded');
                this.expandedSculpture = sculpture;
                
                // Update info panel
                const id = sculpture.dataset.id;
                const label = sculpture.dataset.label;
                const stats = JSON.parse(sculpture.dataset.stats);
                const type = sculpture.dataset.type;
                
                this.infoTitle.textContent = label;
                
                // Clear and populate content
                this.infoContent.innerHTML = '';
                
                // Core info section
                const coreSection = this.createInfoSection('CORE IDENTITY', [
                    ['NODE ID', id],
                    ['TYPE', type.toUpperCase()],
                    ['STATUS', 'ACTIVE'],
                    ['CLEARANCE', 'LEVEL 5']
                ]);
                
                // Stats section
                const statsSection = this.createInfoSection('TELEMETRY DATA', 
                    Object.entries(stats).map(([key, value]) => [
                        key.toUpperCase().replace('_', ' '),
                        value
                    ])
                );
                
                // Systems section
                const systemsSection = this.createInfoSection('CONNECTED SYSTEMS', [
                    ['NEURAL_LINK', 'SYNCED (98.7%)'],
                    ['GNỲSIS_CORE', 'OPTIMAL'],
                    ['THOUGHT_STREAM', 'ACTIVE'],
                    ['EMOTIONAL_STATE', 'FOCUSED']
                ]);
                
                // Security section
                const securitySection = this.createInfoSection('SECURITY PROTOCOLS', [
                    ['ENCRYPTION', 'QUANTUM-READY'],
                    ['ACCESS', 'BIOMETRIC'],
                    ['INTEGRITY', 'VERIFIED'],
                    ['FEEDBACK', 'PSYCHIC']
                ]);
                
                this.infoContent.appendChild(coreSection);
                this.infoContent.appendChild(statsSection);
                this.infoContent.appendChild(systemsSection);
                this.infoContent.appendChild(securitySection);
                
                // Show panel
                this.infoPanel.classList.add('active');
                
                // Add glow effect to sculpture
                sculpture.style.boxShadow = `0 0 30px var(--neon-green)`;
            }
            
            createInfoSection(title, items) {
                const section = document.createElement('div');
                section.className = 'info-section';
                
                const sectionTitle = document.createElement('div');
                sectionTitle.className = 'info-section-title';
                sectionTitle.textContent = title;
                
                const content = document.createElement('div');
                items.forEach(item => {
                    const itemEl = document.createElement('div');
                    itemEl.className = 'info-item';
                    
                    const label = document.createElement('span');
                    label.className = 'info-label';
                    label.textContent = item[0];
                    
                    const value = document.createElement('span');
                    value.className = 'info-value';
                    value.textContent = item[1];
                    
                    itemEl.appendChild(label);
                    itemEl.appendChild(value);
                    content.appendChild(itemEl);
                });
                
                section.appendChild(sectionTitle);
                section.appendChild(content);
                return section;
            }
            
            closeInfoPanel() {
                if (this.expandedSculpture) {
                    this.expandedSculpture.classList.remove('expanded');
                    this.expandedSculpture.style.boxShadow = '0 0 20px rgba(0, 0, 0, 0.5)';
                    this.expandedSculpture = null;
                }
                this.infoPanel.classList.remove('active');
            }
            
            createPulseRing(x, y) {
                const ring = document.createElement('div');
                ring.style.position = 'fixed';
                ring.style.left = `${x}px`;
                ring.style.top = `${y}px`;
                ring.style.width = '0px';
                ring.style.height = '0px';
                ring.style.border = '2px solid var(--neon-green)';
                ring.style.borderRadius = '50%';
                ring.style.transform = 'translate(-50%, -50%)';
                ring.style.pointerEvents = 'none';
                ring.style.zIndex = '100';
                ring.style.opacity = '0.7';
                
                document.body.appendChild(ring);
                
                // Animate ring
                let size = 0;
                const animate = () => {
                    size += 5;
                    ring.style.width = `${size}px`;
                    ring.style.height = `${size}px`;
                    ring.style.opacity = `${0.7 * (1 - size / 100)}`;
                    
                    if (size < 100) {
                        requestAnimationFrame(animate);
                    } else {
                        document.body.removeChild(ring);
                    }
                };
                
                requestAnimationFrame(animate);
            }
        }
        
        // Initialize the garden
        const garden = new DataSculptureGarden();
        
        // Add some ambient interaction
        setInterval(() => {
            // Occasionally pulse a random sculpture
            if (document.querySelectorAll('.sculpture').length > 0 && Math.random() > 0.95) {
                const sculptures = document.querySelectorAll('.sculpture');
                const randomSculpture = sculptures[Math.floor(Math.random() * sculptures.length)];
                randomSculpture.style.transform = `scale(1.1) rotateY(${Math.random() * 20}deg) rotateX(${Math.random() * 20}deg)`;
                setTimeout(() => {
                    randomSculpture.style.transform = '';
                }, 300);
            }
        }, 2000);
    </script>
</body>
</html>
