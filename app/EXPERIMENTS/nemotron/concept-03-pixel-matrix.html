<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYF V4 - Pixel Matrix Overlord</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --void-black: #050505;
            --neon-green: #39FF14;
            --radioactive-yellow: #CCFF00;
            --cyber-red: #FF003C;
            --matrix-blue: #00D4FF;
            --pixel-green: #00FF00;
            --pixel-yellow: #FFFF00;
            --pixel-red: #FF0000;
            --pixel-blue: #00FFFF;
            --font-display: 'Orbitron', monospace;
            --font-mono: 'JetBrains Mono', monospace;
            --font-pixel: 'VT323', monospace;
            --pixel-size: 4px;
        }
        
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&family=VT323&display=swap');
        
        body {
            background-color: var(--void-black);
            color: var(--neon-green);
            font-family: var(--font-mono);
            height: 100vh;
            overflow: hidden;
            position: relative;
            touch-action: manipulation;
        }
        
        #pixel-canvas {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: var(--void-black);
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        .pixel {
            position: absolute;
            width: var(--pixel-size);
            height: var(--pixel-size);
            background: var(--void-black);
        }
        
        .hud-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 1px,
                    rgba(57, 255, 20, 0.03) 1px,
                    rgba(57, 255, 20, 0.03) 2px
                );
            animation: scanMove 4s linear infinite;
        }
        
        @keyframes scanMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(100vh); }
        }
        
        .hud-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 20;
        }
        
        .hero-title {
            font-family: var(--font-display);
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 900;
            letter-spacing: -0.02em;
            text-shadow: 
                0 0 5px var(--neon-green),
                0 0 10px var(--neon-green);
            margin-bottom: 1.5rem;
            position: relative;
            display: inline-block;
        }
        
        .hero-title::after {
            content: attr(data-pixel-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(
                    45deg,
                    transparent,
                    transparent 1px,
                    rgba(0, 0, 0, 0.1) 1px,
                    rgba(0, 0, 0, 0.1) 2px
                );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: pixelShift 2s ease-in-out infinite;
        }
        
        @keyframes pixelShift {
            0%, 100% { background-position: 0 0; }
            25% { background-position: 25% 0; }
            50% { background-position: 50% 0; }
            75% { background-position: 75% 0; }
            100% { background-position: 0 0; }
        }
        
        .hero-subtext {
            font-size: 1.2rem;
            opacity: 0.7;
            margin-bottom: 2rem;
            letter-spacing: 0.1em;
            font-family: var(--font-display);
            text-transform: uppercase;
            font-variant-numeric: tabular-nums;
        }
        
        .cta-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }
        
        .pixel-button {
            position: relative;
            width: 120px;
            height: 40px;
            background: transparent;
            border: 2px solid;
            color: inherit;
            font-family: var(--font-display);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s ease;
            image-rendering: pixelated;
        }
        
        .pixel-button.type-file { border-color: var(--neon-green); color: var(--neon-green); }
        .pixel-button.type-folder { border-color: var(--radioactive-yellow); color: var(--radioactive-yellow); }
        .pixel-button.type-log { border-color: var(--matrix-blue); color: var(--matrix-blue); }
        .pixel-button.type-core { border-color: var(--cyber-red); color: var(--cyber-red); }
        
        .pixel-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px currentColor;
        }
        
        .pixel-button:active {
            transform: translateY(0);
        }
        
        .pixel-button.pixelated {
            animation: pixelate 0.1s ease-in-out;
        }
        
        @keyframes pixelate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.95); }
        }
        
        .pixel-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            transition: 0.5s;
        }
        
        .pixel-button:hover::before {
            left: 100%;
        }
        
        .status-bar {
            position: absolute;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        .status-dot.active { background: var(--neon-green); }
        .status-dot.warning { background: var(--radioactive-yellow); }
        .status-dot.info { background: var(--matrix-blue); }
        .status-dot.error { background: var(--cyber-red); }
        
        .watermark {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 0.8rem;
            opacity: 0.3;
            font-family: var(--font-mono);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        
        @media (max-width: 768px) {
            .hero-title {
                font-size: clamp(4rem, 15vw, 8rem);
            }
            
            .hero-subtext {
                font-size: 1rem;
            }
            
            .pixel-button {
                width: 100px;
                height: 35px;
                font-size: 0.8rem;
            }
            
            .status-bar {
                bottom: 0.5rem;
                font-size: 0.8rem;
            }
            
            .watermark {
                top: 0.5rem;
                right: 0.5rem;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div id="pixel-canvas"></div>
    <div class="hud-overlay">
        <div class="hud-content">
            <h1 class="hero-title" data-pixel-text="SYF">SYF</h1>
            <div class="hero-subtext">
                CORE_SYF_INITIALIZED<br>
                <span style="opacity: 0.6;">RECURSIVE_INTEGRITY: 100% | THOUGHT_STREAM: ACTIVE</span>
            </div>
            
            <div class="cta-panel">
                <button class="pixel-button type-file">[ INITIALIZE_SCAN ]</button>
                <button class="pixel-button type-folder">[ ACCESS_BRAIN ]</button>
                <button class="pixel-button type-log">[ EVOLVE_PROTOCOL ]</button>
                <button class="pixel-button type-core">[ PURGE_CACHE ]</button>
            </div>
        </div>
        
        <div class="status-bar">
            <div class="status-item">
                <div class="status-dot active"></div>
                <span>NEURAL_LINK: STABLE</span>
            </div>
            <div class="status-item">
                <div class="status-dot warning"></span>
                <span>GLITCH_LEVEL: NOMINAL</span>
            </div>
            <div class="status-item">
                <div class="status-dot info"></span>
                <span>DATA_FLOW: OPTIMAL</span>
            </div>
        </div>
        
        <div class="watermark">SYF V4.0 • PIXEL MATRIX</div>
        <div class="scanlines"></div>
    </div>

    <script>
        class PixelMatrixOverlord {
            constructor() {
                this.canvas = document.getElementById('pixel-canvas');
                this.pixelSize = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--pixel-size'));
                this.canvasWidth = Math.ceil(window.innerWidth / this.pixelSize);
                this.canvasHeight = Math.ceil(window.innerHeight / this.pixelSize);
                this.pixels = [];
                this.mouse = { x: 0, y: 0, radius: 20 };
                this.particles = [];
                this.init();
            }
            
            init() {
                this.resize();
                this.createPixelGrid();
                this.createParticles(100);
                this.setupEventListeners();
                this.animate();
                
                // Initial pulse effect
                setTimeout(() => {
                    this.createRadialPulse(this.canvasWidth / 2, this.canvasHeight / 2, 30);
                }, 1000);
            }
            
            resize() {
                this.canvasWidth = Math.ceil(window.innerWidth / this.pixelSize);
                this.canvasHeight = Math.ceil(window.innerHeight / this.pixelSize);
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }
            
            createPixelGrid() {
                // Create base pixel grid
                for (let y = 0; y < this.canvasHeight; y++) {
                    for (let x = 0; x < this.canvasWidth; x++) {
                        const pixel = document.createElement('div');
                        pixel.className = 'pixel';
                        pixel.style.left = `${x * this.pixelSize}px`;
                        pixel.style.top = `${y * this.pixelSize}px`;
                        
                        // Initial randomized pattern
                        const rand = Math.random();
                        if (rand > 0.98) {
                            pixel.style.background = var(--neon-green);
                        } else if (rand > 0.95) {
                            pixel.style.background = var(--matrix-blue);
                        } else if (rand > 0.90) {
                            pixel.style.background = var(--radioactive-yellow);
                        } else if (rand > 0.85) {
                            pixel.style.background = var(--cyber-red);
                        }
                        
                        this.canvas.appendChild(pixel);
                        this.pixels.push({
                            element: pixel,
                            x: x,
                            y: y,
                            originalColor: pixel.style.backgroundColor || 'rgba(0,0,0,0)',
                            currentColor: pixel.style.backgroundColor || 'rgba(0,0,0,0)',
                            pulseOffset: Math.random() * Math.PI * 2
                        });
                    }
                }
            }
            
            createParticles(count) {
                for (let i = 0; i < count; i++) {
                    this.particles.push({
                        x: Math.random() * this.canvasWidth,
                        y: Math.random() * this.canvasHeight,
                        vx: (Math.random() - 0.5) * 0.5,
                        vy: (Math.random() - 0.5) * 0.5,
                        size: Math.random() * 2 + 0.5,
                        color: `hsla(${Math.random() * 60 + 80}, 80%, 50%, ${Math.random() * 0.5 + 0.3})`,
                        life: Math.random() * 100 + 50,
                        maxLife: Math.random() * 100 + 50
                    });
                }
            }
            
            setupEventListeners() {
                window.addEventListener('resize', () => {
                    this.resize();
                    this.createPixelGrid();
                });
                
                window.addEventListener('mousemove', (e) => {
                    this.mouse.x = e.clientX / this.pixelSize;
                    this.mouse.y = e.clientY / this.pixelSize;
                });
                
                window.addEventListener('touchmove', (e) => {
                    if (e.touches.length > 0) {
                        this.mouse.x = e.touches[0].clientX / this.pixelSize;
                        this.mouse.y = e.touches[0].clientY / this.pixelSize;
                    }
                }, { passive: true });
                
                // Click effects
                this.canvas.addEventListener('click', (e) => {
                    const pixelX = Math.floor(e.offsetX / this.pixelSize);
                    const pixelY = Math.floor(e.offsetY / this.pixelSize);
                    this.createExplosion(pixelX, pixelY, 15);
                    
                    // Trigger HUD button effects based on approximate position
                    const btnEffect = this.getButtonAtPosition(e.offsetX, e.offsetY);
                    if (btnEffect) {
                        this.pixelateButton(btnEffect);
                    }
                });
            }
            
            getButtonAtPosition(clientX, clientY) {
                const hudContent = document.querySelector('.hud-content');
                const rect = hudContent.getBoundingClientRect();
                
                if (clientX >= rect.left && clientX <= rect.right && 
                    clientY >= rect.top && clientY <= rect.bottom) {
                    
                    const relativeX = clientX - rect.left;
                    const relativeY = clientY - rect.top;
                    const buttonWidth = 120;
                    const buttonHeight = 40;
                    const startX = rect.width / 2 - (buttonWidth * 2 + 20) / 2;
                    const startY = rect.height / 2 + 20;
                    
                    const col = Math.floor((relativeX - startX) / (buttonWidth + 10));
                    const row = Math.floor((relativeY - startY) / (buttonHeight + 10));
                    
                    if (col >= 0 && col < 2 && row >= 0 && row < 2) {
                        const buttons = ['[ INITIALIZE_SCAN ]', '[ ACCESS_BRAIN ]', '[ EVOLVE_PROTOCOL ]', '[ PURGE_CACHE ]'];
                        const index = row * 2 + col;
                        return buttons[index];
                    }
                }
                return null;
            }
            
            pixelateButton(buttonText) {
                // This would trigger a pixelation effect on the button
                // For simplicity, we'll just create a local particle burst
                const btn = Array.from(document.querySelectorAll('.pixel-button'))
                    .find(b => b.textContent.trim() === buttonText);
                if (btn) {
                    const rect = btn.getBoundingClientRect();
                    const centerX = (rect.left + rect.right) / 2 / this.pixelSize;
                    const centerY = (rect.top + rect.bottom) / 2 / this.pixelSize;
                    this.createExplosion(centerX, centerY, 8);
                }
            }
            
            createExplosion(centerX, centerY, radius) {
                const particleCount = Math.min(20 + radius, 50);
                for (let i = 0; i < particleCount; i++) {
                    const angle = (i / particleCount) * Math.PI * 2;
                    const distance = Math.random() * radius;
                    const vx = Math.cos(angle) * (distance * 0.1 + Math.random() * 0.5);
                    const vy = Math.sin(angle) * (distance * 0.1 + Math.random() * 0.5);
                    
                    this.particles.push({
                        x: centerX + Math.cos(angle) * distance * 0.5,
                        y: centerY + Math.sin(angle) * distance * 0.5,
                        vx: vx,
                        vy: vy,
                        size: Math.random() * 2 + 1,
                        color: `hsla(${Math.random() * 60 + 80}, 80%, 50%, ${Math.random() * 0.5 + 0.3})`,
                        life: Math.random() * 30 + 20,
                        maxLife: Math.random() * 30 + 20
                    });
                }
                
                // Create radial pixel effect
                this.createRadialPixels(centerX, centerY, radius, 0.3);
            }
            
            createRadialPixels(centerX, centerY, radius, intensity) {
                const pixelCount = Math.PI * radius * 2; // Circumference
                for (let i = 0; i < pixelCount; i++) {
                    const angle = (i / pixelCount) * Math.PI * 2;
                    const x = Math.floor(centerX + Math.cos(angle) * radius);
                    const y = Math.floor(centerY + Math.sin(angle) * radius);
                    
                    if (x >= 0 && x < this.canvasWidth && y >= 0 && y < this.canvasHeight) {
                        const pixelIndex = y * this.canvasWidth + x;
                        if (this.pixels[pixelIndex]) {
                            // Store original if not already stored
                            if (!this.pixels[pixelIndex].originalStored) {
                                this.pixels[pixelIndex].originalStored = true;
                                this.pixels[pixelIndex].originalColor = this.pixels[pixelIndex].element.style.backgroundColor;
                            }
                            
                            // Set to bright color temporarily
                            const colors = [
                                'var(--neon-green)',
                                'var(--radioactive-yellow)',
                                'var(--matrix-blue)',
                                'var(--cyber-red)'
                            ];
                            const color = colors[Math.floor(Math.random() * colors.length)];
                            this.pixels[pixelIndex].element.style.background = color;
                            
                            // Schedule return to original
                            setTimeout(() => {
                                if (this.pixels[pixelIndex] && this.pixels[pixelIndex].originalStored) {
                                    this.pixels[pixelIndex].element.style.background = this.pixels[pixelIndex].originalColor;
                                    this.pixels[pixelIndex].originalStored = false;
                                }
                            }, 300 + Math.random() * 200);
                        }
                    }
                }
            }
            
            createRadialPulse(centerX, centerY, radius) {
                // Create expanding ring of active pixels
                const rings = 3;
                for (let r = 0; r < rings; r++) {
                    setTimeout(() => {
                        const pulseRadius = radius + (r * 10);
                        this.createRadialPixels(centerX, centerY, pulseRadius, 0.5);
                    }, r * 100);
                }
            }
            
            updateParticles() {
                this.particles.forEach((particle, index) => {
                    // Move particle
                    particle.x += particle.vx;
                    particle.y += particle.vy;
                    
                    // Life decay
                    particle.life--;
                    if (particle.life <= 0) {
                        // Respawn particle
                        particle.x = Math.random() * this.canvasWidth;
                        particle.y = Math.random() * this.canvasHeight;
                        particle.vx = (Math.random() - 0.5) * 0.5;
                        particle.vy = (Math.random() - 0.5) * 0.5;
                        particle.life = particle.maxLife;
                    }
                    
                    // Boundary wrapping
                    if (particle.x < 0) particle.x = this.canvasWidth;
                    if (particle.x > this.canvasWidth) particle.x = 0;
                    if (particle.y < 0) particle.y = this.canvasHeight;
                    if (particle.y > this.canvasHeight) particle.y = 0;
                });
            }
            
            drawParticles() {
                // Clear canvas for particles (we'll use CSS for actual pixels)
                // Particles are handled by the pixel elements themselves
            }
            
            animate() {
                this.updateParticles();
                
                // Update pixel glow based on mouse proximity
                this.pixels.forEach(pixel => {
                    const dx = pixel.x - this.mouse.x;
                    const dy = pixel.y - this.mouse.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < this.mouse.radius) {
                        const intensity = 1 - (distance / this.mouse.radius);
                        const pulse = Math.sin(Date.now() * 0.002 + pixel.pulseOffset) * 0.3 + 0.7;
                        
                        // Only affect pixels that are currently black/void
                        const currentBg = pixel.element.style.backgroundColor;
                        if (currentBg === 'rgba(0, 0, 0, 0)' || currentBg === '' || currentBg === 'rgb(0, 0, 0)') {
                            const glowIntensity = intensity * pulse * 0.4;
                            if (glowIntensity > 0.1) {
                                // Add subtle glow
                                pixel.element.style.boxShadow = `0 0 ${Math.max(1, glowIntensity * 3)}px var(--neon-green)`;
                            } else {
                                pixel.element.style.boxShadow = 'none';
                            }
                        }
                    } else {
                        pixel.element.style.boxShadow = 'none';
                    }
                });
                
                requestAnimationFrame(() => this.animate());
            }
        }
        
        // Initialize the pixel matrix
        const pixelMatrix = new PixelMatrixOverlord();
    </script>
</body>
</html>
