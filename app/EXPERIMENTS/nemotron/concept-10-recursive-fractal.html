<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYF V4 - Recursive Fractal Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --void-black: #050505;
            --neon-green: #39FF14;
            --radioactive-yellow: #CCFF00;
            --matrix-blue: #00D4FF;
            --cyber-red: #FF003C;
            --font-display: 'Orbitron', monospace;
            --font-mono: 'JetBrains Mono', monospace;
            --fractal-depth: 0;
            --max-depth: 5;
        }
        
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            background-color: var(--void-black);
            color: var(--neon-green);
            font-family: var(--font-mono);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        #fractal-container {
            position: relative;
            width: 100%;
            height: 100%;
            perspective: 1000px;
            background: 
                radial-gradient(circle at center, rgba(57, 255, 20, 0.02) 0%, transparent 50%);
        }
        
        .fractal-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 0;
            height: 0;
            pointer-events: none;
            transition: all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 10;
        }
        
        .fractal-layer.active {
            width: 600px;
            height: 400px;
        }
        
        .fractal-panel {
            position: relative;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 5, 0.7);
            border: 2px solid;
            border-radius: 0;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            transform-style: preserve-3d;
        }
        
        .fractal-panel.type-core { border-color: var(--neon-green); }
        .fractal-panel.type-archive { border-color: var(--radioactive-yellow); }
        .fractal-panel.type-logs { border-color: var(--matrix-blue); }
        .fractal-panel.type-emotion { border-color: var(--cyber-red); }
        
        .fractal-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 2rem;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .fractal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(57, 255, 20, 0.3);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .fractal-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .fractal-title::before {
            content: '▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓';
            font-size: 0.6em;
            opacity: 0.2;
        }
        
        .fractal-close {
            background: transparent;
            border: 2px solid currentColor;
            color: currentColor;
            width: 2.5rem;
            height: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .fractal-close:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(90deg);
        }
        
        .fractal-body {
            flex: 1;
            display: grid;
            gap: 1.5rem;
        }
        
        .fractal-stats {
            display: grid;
            gap: 0.8rem;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            font-family: var(--font-mono);
            font-size: 0.9rem;
        }
        
        .stat-label {
            opacity: 0.7;
        }
        
        .stat-value {
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }
        
        .fractal-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(57, 255, 20, 0.3);
            padding-top: 1rem;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .fractal-nav {
            display: flex;
            gap: 1rem;
        }
        
        .fractal-nav button {
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 0.5rem 1rem;
            font-family: var(--font-display);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .fractal-nav button:hover {
            background: rgba(57, 255, 20, 0.1);
            transform: translateY(-2px);
        }
        
        .fractal-nav button.active {
            background: rgba(57, 255, 20, 0.2);
            box-shadow: 0 0 10px var(--neon-green);
        }
        
        .recursive-indicator {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--neon-green);
            border-radius: 0;
            padding: 0.5rem 1rem;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .recursive-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--neon-green);
            animation: pulseDot 1.5s infinite;
        }
        
        @keyframes pulseDot {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(57, 255, 20, 0.03) 2px,
                    rgba(57, 255, 20, 0.03) 4px
                );
            animation: scanMove 4s linear infinite;
        }
        
        @keyframes scanMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(100vh); }
        }
        
        .watermark {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            font-size: 0.8rem;
            opacity: 0.3;
            font-family: var(--font-mono);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        
        .fractal-glitch {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
            opacity: 0;
        }
        
        .fractal-glitch.active {
            opacity: 0.1;
            animation: fractalGlitch 0.3s ease-in-out;
        }
        
        @keyframes fractalGlitch {
            0%, 100% { transform: translate(0); }
            25% { transform: translate(-2px, 2px); }
            50% { transform: translate(2px, -2px); }
            75% { transform: translate(-1px, 1px); }
            100% { transform: translate(0); }
        }
        
        @media (max-width: 768px) {
            .fractal-layer.active {
                width: 90vw;
                height: 60vh;
            }
            
            .fractal-title {
                font-size: 1.2rem;
            }
            
            .fractal-stats {
                grid-template-columns: 1fr;
            }
            
            .watermark {
                bottom: 1rem;
                left: 1rem;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div id="fractal-container">
        <!-- Fractal layers will be generated by JavaScript -->
    </div>
    
    <div class="recursive-indicator" id="recursive-indicator">
        <div class="recursive-dot"></div>
        <span>DEPTH: <span id="depth-value">0</span>/<span id="max-depth">5</span></span>
    </div>
    
    <div class="scanlines"></div>
    <div class="fractal-glitch" id="fractal-glitch"></div>
    <div class="watermark">SYF V4.0 • RECURSIVE FRACTAL</div>
</body>

<script>
    class RecursiveFractalInterface {
        constructor() {
            this.container = document.getElementById('fractal-container');
            this.indicator = document.getElementById('recursive-indicator');
            this.depthValue = document.getElementById('depth-value');
            this.maxDepthValue = document.getElementById('max-depth');
            this.fractalGlitch = document.getElementById('fractal-glitch');
            this.layers = [];
            this.maxDepth = 5;
            this.currentDepth = 0;
            this.init();
        }
        
        init() {
            this.createInitialLayer();
            this.setupEventListeners();
            this.startAmbientEffects();
            
            // Initial depth exploration
            setTimeout(() => {
                this.exploreDepth(1);
            }, 1000);
            
            setTimeout(() => {
                this.exploreDepth(2);
            }, 2500);
            
            setTimeout(() => {
                this.exploreDepth(3);
            }, 4000);
        }
        
        createInitialLayer() {
            const layer = this.createFractalLayer(0, 'core');
            this.layers.push(layer);
            this.container.appendChild(layer.element);
            
            // Activate after a brief delay
            setTimeout(() => {
                layer.activate();
            }, 500);
        }
        
        createFractalLayer(depth, type) {
            const layerElement = document.createElement('div');
            layerElement.className = 'fractal-layer';
            
            const panelElement = document.createElement('div');
            panelElement.className = `fractal-panel type-${type}`;
            
            const contentElement = document.createElement('div');
            contentElement.className = 'fractal-content';
            
            // Header
            const headerElement = document.createElement('div');
            headerElement.className = 'fractal-header';
            
            const titleElement = document.createElement('div');
            titleElement.className = 'fractal-title';
            
            const icons = {
                core: '⚛',
                archive: '📁',
                logs: '📜',
                emotion: '💓'
            };
            
            titleElement.innerHTML = `<span>${icons[type]||'⚛'}</span> ${type.toUpperCase()}`;
            
            const closeElement = document.createElement('button');
            closeElement.className = 'fractal-close';
            closeElement.innerHTML = '&times;';
            closeElement.onclick = () => this.closeLayer(layer);
            
            headerElement.appendChild(titleElement);
            headerElement.appendChild(closeElement);
            
            // Body
            const bodyElement = document.createElement('div');
            bodyElement.className = 'fractal-body';
            
            const statsElement = document.createElement('div');
            statsElement.className = 'fractal-stats';
            
            // Add stats based on type
            const statsData = this.getStatsForType(type);
            statsData.forEach(stat => {
                const rowElement = document.createElement('div');
                rowElement.className = 'stat-row';
                rowElement.innerHTML = `<span class="stat-label">${stat.label}:</span><span class="stat-value">${stat.value}</span>`;
                statsElement.appendChild(rowElement);
            });
            
            // Footer
            const footerElement = document.createElement('div');
            footerElement.className = 'fractal-footer';
            
            const depthInfo = document.createElement('div');
            depthInfo.textContent = `RECURSION DEPTH: ${depth}/${this.maxDepth}`;
            
            const navElement = document.createElement('div');
            navElement.className = 'fractal-nav';
            
            const prevButton = document.createElement('button');
            prevButton.textContent = '[ PREV ]';
            prevButton.disabled = depth === 0;
            prevButton.onclick = () => this.navigateDepth(depth - 1);
            
            const nextButton = document.createElement('button');
            nextButton.textContent = '[ NEXT ]';
            nextButton.disabled = depth >= this.maxDepth;
            nextButton.onclick = () => this.navigateDepth(depth + 1);
            
            const exploreButton = document.createElement('button');
            exploreButton.textContent = '[ EXPLORE ]';
            exploreButton.onclick = () => this.exploreRandomDepth();
            
            navElement.appendChild(prevButton);
            navElement.appendChild(nextButton);
            navElement.appendChild(exploreButton);
            
            footerElement.appendChild(depthInfo);
            footerElement.appendChild(navElement);
            
            // Assemble
            contentElement.appendChild(headerElement);
            contentElement.appendChild(bodyElement);
            bodyElement.appendChild(statsElement);
            contentElement.appendChild(footerElement);
            
            panelElement.appendChild(contentElement);
            layerElement.appendChild(panelElement);
            
            const layerObject = {
                element: layerElement,
                panel: panelElement,
                content: contentElement,
                depth: depth,
                type: type,
                active: false,
                activate: () => {
                    layerElement.classList.add('active');
                    layerObject.active = true;
                    this.updateDepthIndicator();
                    this.triggerDepthGlitch();
                },
                deactivate: () => {
                    layerElement.classList.remove('active');
                    layerObject.active = false;
                }
            };
            
            return layerObject;
        }
        
        getStatsForType(type) {
            const statsMap = {
                core: [
                    { label: 'STATUS', value: 'OPTIMAL' },
                    { label: 'SYNC', value: '98.7%' },
                    { label: 'LATENCY', value: '12ms' },
                    { label: 'MEMORY', value: '4.2 GB' }
                ],
                archive: [
                    { label: 'FILES', value: '1,247' },
                    { label: 'SIZE', value: '8.7 GB' },
                    { label: 'TYPE', value: 'MIXED MEDIA' },
                    { label: 'ACCESS', value: 'LEVEL 5' }
                ],
                logs: [
                    { label: 'ENTRIES', value: '142,891' },
                    { label: 'ERRORS', value: '0' },
                    { label: 'LATEST', value: 'ACTIVE' },
                    { label: 'RATE', value: '2.4 KB/s' }
                ],
                emotion: [
                    { label: 'STATE', value: 'DETERMINACJA' },
                    { label: 'STABILITY', value: '92%' },
                    { label: 'VARIANCE', value: 'LOW' },
                    { label: 'RESONANCE', value: 'STRONG' }
                ]
            };
            
            return statsMap[type] || [
                { label: 'STATUS', value: 'ACTIVE' },
                { label: 'DEPTH', value: `${type}` }
            ];
        }
        
        setupEventListeners() {
            window.addEventListener('resize', () => {
                // Update layer positions if needed
            });
            
            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowUp' || e.key === 'PageUp') {
                    this.navigateDepth(Math.min(this.currentDepth + 1, this.maxDepth));
                } else if (e.key === 'ArrowDown' || e.key === 'PageDown') {
                    this.navigateDepth(Math.max(this.currentDepth - 1, 0));
                } else if (e.key === ' ') {
                    this.exploreRandomDepth();
                }
            });
            
            // Click to explore deeper
            this.container.addEventListener('click', (e) => {
                // Only if clicking on an active layer
                const activeLayer = this.layers.find(l => l.active);
                if (activeLayer && activeLayer.depth < this.maxDepth) {
                    this.exploreDepth(activeLayer.depth + 1);
                }
            });
        }
        
        navigateDepth(targetDepth) {
            if (targetDepth < 0 || targetDepth > this.maxDepth) return;
            
            // Deactivate current layer
            const currentLayer = this.layers.find(l => l.active);
            if (currentLayer) {
                currentLayer.deactivate();
            }
            
            // Find or create layer at target depth
            let targetLayer = this.layers.find(l => l.depth === targetDepth);
            
            if (!targetLayer) {
                // Determine type based on depth
                const types = ['core', 'archive', 'logs', 'emotion', 'core'];
                const type = types[targetDepth % types.length];
                targetLayer = this.createFractalLayer(targetDepth, type);
                this.layers.push(targetLayer);
                this.container.appendChild(targetLayer.element);
            }
            
            // Activate target layer
            targetLayer.activate();
            this.currentDepth = targetDepth;
            
            // Animate the transition
            this.animateDepthTransition(targetDepth);
        }
        
        exploreDepth(depth) {
            if (depth > this.maxDepth) return;
            
            // Create layer if it doesn't exist
            let layer = this.layers.find(l => l.depth === depth);
            if (!layer) {
                const types = ['core', 'archive', 'logs', 'emotion', 'core'];
                const type = types[depth % types.length];
                layer = this.createFractalLayer(depth, type);
                this.layers.push(layer);
                this.container.appendChild(layer.element);
            }
            
            // Activate it
            layer.activate();
            
            // Update current depth if going deeper
            if (depth > this.currentDepth) {
                this.currentDepth = depth;
            }
            
            this.updateDepthIndicator();
            this.triggerDepthGlitch();
        }
        
        exploreRandomDepth() {
            const randomDepth = Math.floor(Math.random() * (this.maxDepth + 1));
            this.navigateDepth(randomDepth);
        }
        
        closeLayer(layerToClose) {
            layerToClose.deactivate();
            
            // If closing current layer, go to parent or root
            if (layerToClose.active) {
                const parentDepth = Math.max(layerToClose.depth - 1, 0);
                this.navigateDepth(parentDepth);
            }
            
            // Remove from container but keep in layers array for potential reuse
            // this.container.removeChild(layerToClose.element);
        }
        
        updateDepthIndicator() {
            this.depthValue.textContent = this.currentDepth;
            this.maxDepthValue.textContent = this.maxDepth;
        }
        
        triggerDepthGlitch() {
            this.fractalGlitch.classList.add('active');
            setTimeout(() => {
                this.fractalGlitch.classList.remove('active');
            }, 300);
        }
        
        animateDepthTransition(targetDepth) {
            // Create a sense of moving through layers
            const layers = document.querySelectorAll('.fractal-layer');
            layers.forEach((layer, index) => {
                const layerObj = this.layers.find(l => l.element === layer);
                if (layerObj) {
                    const depthDiff = layerObj.depth - targetDepth;
                    const distance = Math.abs(depthDiff) * 20;
                    const delay = Math.abs(depthDiff) * 100;
                    
                    setTimeout(() => {
                        layer.style.transform = `translate(-50%, -50%) translateY(${depthDiff * 10}px)`;
                        layer.style.opacity = layerObj.active ? '1' : `${0.3 + (1 - Math.abs(depthDiff) / this.maxDepth) * 0.4}`;
                    }, delay);
                }
            });
        }
        
        startAmbientEffects() {
            // Periodic depth explorations
            setInterval(() => {
                if (Math.random() > 0.98) {
                    const randomDepth = Math.floor(Math.random() * (this.maxDepth + 1));
                    this.exploreDepth(randomDepth);
                }
            }, 5000 + Math.random() * 3000);
            
            // Recursive pulse effect
            setInterval(() => {
                // Pulse the recursive indicator
                const indicator = this.indicator;
                indicator.style.transform = 'scale(1)';
                setTimeout(() => {
                    indicator.style.transform = 'scale(1.2)';
                    setTimeout(() => {
                        indicator.style.transform = 'scale(1)';
                    }, 100);
                }, 100);
            }, 2000);
        }
    }
    
    // Initialize the fractal interface
    const fractalInterface = new RecursiveFractalInterface();
</script>
</html>
