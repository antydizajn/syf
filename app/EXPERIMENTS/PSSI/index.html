<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMIERAM – PAULINA JANOWSKA</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
    <style>
        /* ═══════════════════════════════════════════════════════════════
           PSSI V2 - PLAKAT, NIE STRONA
           Polska Szkoła Plakatu - wolne pozycjonowanie, chaos, SZTUKA
        ═══════════════════════════════════════════════════════════════ */

        @font-face {
            font-family: 'Mess';
            src: url('fonts/Mess-Light_web.woff2') format('woff2');
            font-weight: 300;
            font-display: swap;
        }

        @font-face {
            font-family: 'LettersTorn';
            src: url('fonts/Letters-Torn.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }

        @font-face {
            font-family: 'Compagnon';
            src: url('fonts/Compagnon-Bold.woff2') format('woff2');
            font-weight: 700;
            font-display: swap;
        }

        :root {
            --blood: #8A0303;
            --bone: #D4C4A8;
            --ink: #0A0A0A;
            --gold: #C5A059;
            --red-scream: #CC0000;
            --sepia-dark: #2A1810;
            --sepia-mid: #4A3020;
            --parchment: #C4996C;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            background: var(--sepia-dark);
            background-image: url('assets/bg_dark.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            cursor: crosshair;
        }

        /* AGED PAPER TEXTURE - DARK */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.15;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: overlay;
        }

        /* VIGNETTE */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 30%, rgba(0, 0, 0, 0.7) 100%);
            pointer-events: none;
            z-index: 9998;
        }

        /* ═══════════════════════════════════════════════════════════════
           PLAKAT - CANVAS, NIE GRID
        ═══════════════════════════════════════════════════════════════ */

        .plakat {
            position: relative;
            width: 100vw;
            min-height: 100vh;
            overflow: hidden;
        }

        /* ═══════════════════════════════════════════════════════════════
           GŁÓWNY KRZYK - UMIERAM
        ═══════════════════════════════════════════════════════════════ */

        .krzyk {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-3deg);
            font-family: 'LettersTorn', 'Courier New', monospace;
            font-size: clamp(15vw, 20vw, 25vw);
            font-weight: 400;
            color: var(--blood);
            text-shadow:
                8px 8px 0 var(--ink),
                -2px -2px 0 var(--gold);
            letter-spacing: -0.05em;
            line-height: 0.85;
            text-align: center;
            z-index: 10;
            user-select: none;
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) rotate(-3deg) scale(1);
            }

            50% {
                opacity: 0.9;
                transform: translate(-50%, -50%) rotate(-2deg) scale(1.02);
            }
        }

        /* ═══════════════════════════════════════════════════════════════
           ELEMENTY ROZRZUCONE - TOMASZEWSKI STYLE
        ═══════════════════════════════════════════════════════════════ */

        .element {
            position: absolute;
            font-family: 'Mess', monospace;
            z-index: 5;
        }

        .element--subtitle {
            top: 12%;
            left: 8%;
            font-size: clamp(1rem, 2vw, 1.5rem);
            color: var(--parchment);
            transform: rotate(-8deg);
            max-width: 300px;
            line-height: 1.4;
        }

        .element--paulina {
            bottom: 15%;
            right: 5%;
            font-family: 'Compagnon', sans-serif;
            font-size: clamp(2rem, 5vw, 4rem);
            color: var(--bone);
            transform: rotate(5deg);
            writing-mode: vertical-rl;
            text-orientation: mixed;
            letter-spacing: 0.2em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .element--ty {
            top: 20%;
            right: 10%;
            font-family: 'LettersTorn', monospace;
            font-size: clamp(3rem, 8vw, 6rem);
            color: var(--gold);
            transform: rotate(12deg);
            text-shadow: 4px 4px 0 var(--blood), 0 0 20px rgba(197, 160, 89, 0.5);
            z-index: 15;
        }

        .element--zmien {
            bottom: 25%;
            left: 5%;
            font-family: 'Compagnon', sans-serif;
            font-size: clamp(1.5rem, 4vw, 3rem);
            color: var(--red-scream);
            transform: rotate(-15deg);
            text-decoration: underline;
            text-decoration-thickness: 4px;
            text-underline-offset: 8px;
        }

        /* ═══════════════════════════════════════════════════════════════
           PLAMKI / BRUSH STROKES
        ═══════════════════════════════════════════════════════════════ */

        .plama {
            position: absolute;
            border-radius: 50%;
            opacity: 0.6;
            z-index: 1;
            filter: blur(2px);
        }

        .plama--1 {
            top: 5%;
            left: 20%;
            width: 150px;
            height: 80px;
            background: var(--blood);
            transform: rotate(25deg) scaleX(2);
        }

        .plama--2 {
            bottom: 10%;
            right: 25%;
            width: 200px;
            height: 60px;
            background: var(--gold);
            transform: rotate(-35deg) scaleX(1.5);
            opacity: 0.4;
        }

        .plama--3 {
            top: 40%;
            left: 2%;
            width: 100px;
            height: 300px;
            background: var(--ink);
            transform: rotate(5deg);
            opacity: 0.3;
        }

        /* ═══════════════════════════════════════════════════════════════
           LINK / CTA - BRUTALNIE PROSTY
        ═══════════════════════════════════════════════════════════════ */

        .wejscie {
            position: fixed;
            bottom: 3%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Mess', monospace;
            font-size: 1rem;
            color: var(--ink);
            text-decoration: none;
            padding: 1rem 2rem;
            border: 3px solid var(--ink);
            background: var(--bone);
            z-index: 100;
            transition: all 0.2s;
        }

        .wejscie:hover {
            background: var(--blood);
            color: var(--bone);
            border-color: var(--blood);
            transform: translateX(-50%) rotate(-2deg);
        }

        /* ═══════════════════════════════════════════════════════════════
           STAROWIEYSKI - DETAL
        ═══════════════════════════════════════════════════════════════ */

        .sygil {
            position: absolute;
            bottom: 5%;
            left: 5%;
            font-size: 4rem;
            color: var(--gold);
            opacity: 0.7;
            z-index: 2;
        }

        /* ═══════════════════════════════════════════════════════════════
           LINIA PRZEKREŚLENIA
        ═══════════════════════════════════════════════════════════════ */

        .przekreslenie {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 8px;
            background: var(--blood);
            transform: rotate(-2deg);
            z-index: 20;
            opacity: 0.8;
        }

        /* ═══════════════════════════════════════════════════════════════
           RESPONSIVE - ALE CHAOS ZOSTAJE
        ═══════════════════════════════════════════════════════════════ */

        @media (max-width: 768px) {
            .krzyk {
                font-size: 18vw;
            }

            .element--paulina {
                writing-mode: horizontal-tb;
                bottom: 8%;
                right: auto;
                left: 5%;
                font-size: 2rem;
            }

            .element--ty {
                top: 10%;
                right: 5%;
                font-size: 4rem;
            }
        }
    </style>
</head>

<body>
    <div class="plakat">

        <span class="element element--zmien">MOŻESZ TO&nbsp;ZMIENIĆ</span>

        <!-- WEJŚCIE -->
