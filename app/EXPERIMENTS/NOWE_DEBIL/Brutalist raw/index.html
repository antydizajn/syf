<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYF // BRUTAL RAW</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');
    </style>
</head>

<body class="bg-white text-black overflow-x-hidden cursor-crosshair selection:bg-black selection:text-[#ffff00]">

    <!-- DESTRUCTION CANVAS -->
    <canvas id="decay-canvas" class="fixed inset-0 pointer-events-none z-50 mix-blend-difference opacity-100"></canvas>

    <!-- CONTENT WRAPPER -->
    <main class="relative z-10 min-h-screen border-[20px] border-black p-4 md:p-12">

        <!-- HEADER -->
        <header
            class="flex flex-col md:flex-row justify-between border-b-[8px] border-black pb-8 mb-24 relative overflow-hidden group">
            <h1
                class="text-[12vw] leading-[0.8] font-black uppercase break-all transform hover:translate-x-4 transition-transform duration-0">
                SYF_</h1>

            <div
                class="hidden md:block text-right self-end font-mono text-sm md:text-xl font-bold leading-tight uppercase">
                [PUBLICZNY_DUMP]<br>
                NO_DB. NO_BS.<br>
                RAW_HTML_ONLY<br>
                <span class="bg-black text-[#ffff00] px-2">V2.0.77</span>
            </div>

            <!-- Absolute glitch line -->
            <div
                class="absolute bottom-0 left-0 w-full h-[8px] bg-[#ffff00] translate-x-[-100%] group-hover:translate-x-0 transition-transform duration-75">
            </div>
        </header>

        <!-- CONTROLS -->
        <div
            class="flex justify-between items-center border-[4px] border-black p-4 mb-24 hover:bg-black hover:text-[#ffff00] cursor-pointer transition-none font-mono font-bold uppercase">
            <div>Files: 42</div>
            <div>[ SORT: DATE_DESC ]</div>
        </div>

        <!-- FILE LIST (Aggressive Grid) -->
        <div class="grid grid-cols-1 gap-0 border-t-[8px] border-black">

            <!-- ROW 1 -->
            <div
                class="file-row group relative border-b-[4px] border-black p-8 hover:bg-black hover:text-[#ffff00] transition-none cursor-pointer overflow-hidden">
                <div class="relative z-10 flex justify-between items-center font-mono text-xl md:text-4xl font-bold">
                    <span class="group-hover:translate-x-4 transition-transform duration-0">06_research_done/</span>
                    <span>DIR</span>
                </div>
                <!-- Glitch Bars -->
                <div class="absolute top-[20%] left-0 w-full h-[2px] bg-[#ffff00] opacity-0 group-hover:opacity-100">
                </div>
                <div class="absolute top-[80%] left-0 w-full h-[2px] bg-[#ffff00] opacity-0 group-hover:opacity-100">
                </div>
            </div>

            <!-- ROW 2 -->
            <div
                class="file-row group relative border-b-[4px] border-black p-8 hover:bg-black hover:text-[#ffff00] transition-none cursor-pointer overflow-hidden">
                <div class="relative z-10 flex justify-between items-center font-mono text-xl md:text-4xl font-bold">
                    <span class="group-hover:translate-x-4 transition-transform duration-0">BRUTALISM.md</span>
                    <span>14KB</span>
                </div>
            </div>

            <!-- ROW 3 -->
            <div
                class="file-row group relative border-b-[4px] border-black p-8 hover:bg-black hover:text-[#ffff00] transition-none cursor-pointer overflow-hidden">
                <div class="relative z-10 flex justify-between items-center font-mono text-xl md:text-4xl font-bold">
                    <span class="group-hover:translate-x-4 transition-transform duration-0">RECIPES.md</span>
                    <span>2KB</span>
                </div>
            </div>

            <!-- ROW 4 -->
            <div
                class="file-row group relative border-b-[4px] border-black p-8 hover:bg-black hover:text-[#ffff00] transition-none cursor-pointer overflow-hidden">
                <div class="relative z-10 flex justify-between items-center font-mono text-xl md:text-4xl font-bold">
                    <span class="group-hover:translate-x-4 transition-transform duration-0">MANIFESTO.md</span>
                    <span>22KB</span>
                </div>
            </div>

        </div>

        <!-- FOOTER -->
        <footer
            class="mt-32 border-t-[8px] border-black pt-8 font-mono text-sm md:text-lg font-bold uppercase flex flex-col md:flex-row justify-between gap-4">
            <div class="flex flex-col gap-2">
                <a href="#" class="hover:bg-black hover:text-white inline-block w-max px-1">POLITYKA PRYWATNOŚCI</a>
                <a href="#" class="hover:bg-black hover:text-white inline-block w-max px-1">REGULAMIN</a>
                <a href="#" class="hover:bg-black hover:text-white inline-block w-max px-1">COOKIES</a>
            </div>
            <div class="text-right">
                <div class="mb-2">© 2025 ANTYDIZAJN</div>
                <div class="bg-black text-white inline-block px-2">WIEDŹMA AI GNIEWISŁAWA</div>
            </div>
        </footer>

    </main>

    <script src="script.js"></script>
</body>

</html>
