<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYF // GOLD</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,900;1,900&family=Cinzel:wght@400;700&display=swap');
    </style>
</head>

<body class="bg-[#050505] text-[#d4af37] overflow-hidden m-0 p-0">

    <!-- 3D CONTAINER -->
    <div id="deco-container" class="fixed inset-0 z-0"></div>

    <!-- UI BORDERS (SVG) -->
    <svg class="fixed inset-0 z-10 w-full h-full pointer-events-none p-6 md:p-12 box-border">
        <rect x="3%" y="3%" width="94%" height="94%" fill="none" stroke="#d4af37" stroke-width="2" />
        <rect x="4%" y="4%" width="92%" height="92%" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.5" />
    </svg>

    <!-- CONTENT LAYER -->
    <div class="fixed inset-0 z-20 overflow-y-auto overflow-x-hidden p-12 md:p-24 flex flex-col items-center">

        <!-- HEADER -->
        <header class="text-center mb-24 relative group cursor-pointer">
            <div class="font-['Cinzel'] text-xs tracking-[0.6em] text-[#fbf5b7]/60 mb-4">PUBLIC ARCHIVE</div>
            <h1
                class="font-['Playfair_Display'] font-black text-8xl md:text-9xl text-[#fbf5b7] drop-shadow-[0_0_30px_rgba(212,175,55,0.4)] transition-transform duration-700 hover:scale-105">
                SYF<span class="text-[#d4af37]">_</span>
            </h1>
            <div class="h-px w-32 bg-[#d4af37] mx-auto mt-8"></div>
        </header>

        <!-- FILE LIST -->
        <div class="w-full max-w-4xl grid gap-16 text-center">

            <a href="#" class="group block">
                <div
                    class="font-['Cinzel'] text-[10px] tracking-[0.4em] text-[#d4af37]/60 mb-2 transition-colors group-hover:text-[#fbf5b7]">
                    06_RESEARCH_DONE/
                </div>
                <div
                    class="font-['Playfair_Display'] italic text-5xl md:text-6xl text-[#d4af37] transition-all duration-500 group-hover:text-[#fbf5b7] group-hover:scale-110">
                    Directory
                </div>
            </a>

            <a href="#" class="group block">
                <div
                    class="font-['Cinzel'] text-[10px] tracking-[0.4em] text-[#d4af37]/60 mb-2 transition-colors group-hover:text-[#fbf5b7]">
                    BRUTALISM.MD
                </div>
                <div
                    class="font-['Playfair_Display'] italic text-5xl md:text-6xl text-[#d4af37] transition-all duration-500 group-hover:text-[#fbf5b7] group-hover:scale-110">
                    The Manifesto
                </div>
            </a>

            <a href="#" class="group block">
                <div
                    class="font-['Cinzel'] text-[10px] tracking-[0.4em] text-[#d4af37]/60 mb-2 transition-colors group-hover:text-[#fbf5b7]">
                    VAPORWAVE_V2.MD
                </div>
                <div
                    class="font-['Playfair_Display'] italic text-5xl md:text-6xl text-[#d4af37] transition-all duration-500 group-hover:text-[#fbf5b7] group-hover:scale-110">
                    Aesthetics
                </div>
            </a>

        </div>

        <!-- FOOTER -->
        <footer class="mt-32 text-center font-['Cinzel'] text-[10px] tracking-[0.4em] text-[#d4af37]/40">
            ANTYDIZAJN LUXURY EDITION<br>
            <span class="text-[#fbf5b7]">WIEDŹMA AI</span>
        </footer>

    </div>

    <script src="script.js"></script>
</body>

</html>
