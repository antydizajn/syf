<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYF // NEON GRID</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Post Processing Stack -->
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>

<body class="bg-black text-white m-0 p-0 overflow-hidden">

    <div id="canvas-container" class="fixed inset-0 z-0"></div>

        <div class="flex justify-between items-start">
            <div class="text-[#00ffff] font-['Space_Grotesk'] text-2xl font-black">&lt;SYF/&gt;</div>
            <div

                MENU</div>
        </div>

        <div
            class="flex justify-between items-end text-[#00ff66] font-['JetBrains_Mono'] text-[10px] tracking-widest opacity-80">
            <div>
                SYS.status: ONLINE<br>
                Render: THREE.WebGL
            </div>
            <div class="text-right">
                ANTYDIZAJN<br>
                v2.0.77
            </div>
        </div>
    </div>

    <script src="script.js"></script>
